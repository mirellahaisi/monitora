<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitora+ | Gestão de Usuários</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="usuarios-body">

  {% include 'components/sidebar.html' %}

  <main class="usuarios-main">

    {% include 'components/header.html' %}

        <!-- Content -->
        <section class="usuarios-content">
            <h1 class="page-title">Gestão de Usuários</h1>

            <!-- Tabs -->
            <div class="tabs-bar">
                <button class="tab-btn active" data-tab="alunos">Alunos</button>
                <button class="tab-btn" data-tab="coordenacao">Coordenação</button>
                <button class="tab-btn" data-tab="professores">Professores</button>
            </div>

            <!-- Table card -->
            <div class="table-card">
                <div class="table-card-top">
                    <div class="search-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <input type="text" placeholder="Pesquisar">
                    </div>
                    <button class="btn-novo" id="btnNovoAluno">Novo aluno</button>
                </div>

                <table class="usuarios-table">
                    <thead id="tabelaCabecalho">
                        <tr>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>Turma</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo">
                        <!-- Linhas geradas pelo JS -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <div id="modalUsuario" style="display:none;">
        <div class="modal-content">
            <h2 id="tituloModal">Novo usuário</h2>

            <input type="hidden" id="usuarioId">

            <input type="text" id="nome" placeholder="Nome">
            <input type="text" id="cpf" placeholder="CPF">
            <input type="email" id="email" placeholder="E-mail">
            <input type="text" id="telefone" placeholder="Telefone">
            <input type="date" id="dataNascimento">

            <div id="grupoEspecialidade">
                <input type="text" id="especialidade" placeholder="Especialidade">
            </div>

            <div id="grupoSalario">
                <input type="number" id="salario" placeholder="Salário" step="0.01" min="0">
            </div>

            <div class="modal-actions">
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn-salvar" onclick="salvarUsuario()">Salvar</button>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/static/js/componentes.js"></script>
    
    <script>
        // ── Variáveis globais ─────────────────────────────────────────────────────
        let modoEdicao = false;
        let abaAtual = "alunos";
        let dadosAba = {};

        const SVG_VER = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
        const SVG_EDIT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
        const SVG_DEL = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;

        const CONFIG_ABAS = {
            alunos: {
                endpoint: "/api/usuarios/alunos",
                colunas: ["Nome", "CPF", "Turma", "Ações"],
                labelNovo: "Novo aluno",
                renderLinha: (u) => `
                    <td>${u.nome}</td>
                    <td>${u.cpf || "—"}</td>
                    <td>${u.turma || "—"}</td>
                `
            },
            coordenacao: {
                endpoint: "/api/usuarios/coordenacao",
                colunas: ["Nome", "E-mail", "Telefone", "Ações"],
                labelNovo: "Novo coordenador",
                renderLinha: (u) => `
                    <td>${u.nome}</td>
                    <td>${u.email || "—"}</td>
                    <td>${u.telefone || "—"}</td>
                `
            },
            professores: {
                endpoint: "/api/usuarios/professores",
                colunas: ["Nome", "CPF", "Especialidade", "Ações"],
                labelNovo: "Novo professor",
                renderLinha: (u) => `
                    <td>${u.nome}</td>
                    <td>${u.cpf || "—"}</td>
                    <td>${u.especialidade || "—"}</td>
                `
            }
        };

        // ── Utilitários ───────────────────────────────────────────────────────────
        function getToken() {
            return localStorage.getItem("token");
        }

        function limparSessao() {
            localStorage.removeItem("token");
            localStorage.removeItem("usuario");
            localStorage.removeItem("sessaoExpiracao");
        }

        function mostrarCarregando(numColunas) {
            document.getElementById("tabelaCorpo").innerHTML = `
                <tr class="estado-linha">
                  <td colspan="${numColunas}"><span class="spinner"></span> Carregando...</td>
                </tr>`;
        }

        function mostrarVazio(numColunas, mensagem = "Nenhum registro encontrado.") {
            document.getElementById("tabelaCorpo").innerHTML = `
                <tr class="estado-linha">
                  <td colspan="${numColunas}">${mensagem}</td>
                </tr>`;
        }

        function mostrarErro(numColunas, mensagem = "Erro ao carregar dados.") {
            document.getElementById("tabelaCorpo").innerHTML = `
                <tr class="estado-linha">
                  <td colspan="${numColunas}" style="color:#ef4444">${mensagem}</td>
                </tr>`;
        }

        function atualizarCabecalho(colunas) {
            document.getElementById("tabelaCabecalho").innerHTML =
                `<tr>${colunas.map(c => `<th>${c}</th>`).join("")}</tr>`;
        }

        // ── Modal ─────────────────────────────────────────────────────────────────
        function fecharModal() {
            document.getElementById("modalUsuario").style.display = "none";
        }

        function limparFormulario() {
            document.getElementById("usuarioId").value = "";
            document.getElementById("nome").value = "";
            document.getElementById("cpf").value = "";
            document.getElementById("email").value = "";
            document.getElementById("telefone").value = "";
            document.getElementById("dataNascimento").value = "";
            document.getElementById("especialidade").value = "";
            document.getElementById("salario").value = "";
        }

        async function salvarUsuario() {
            const token = getToken();

            const dados = {
                nome: document.getElementById("nome").value,
                cpf: document.getElementById("cpf").value,
                email: document.getElementById("email").value,
                telefone: document.getElementById("telefone").value,
                especialidade: document.getElementById("especialidade").value,
                data_nascimento: document.getElementById("dataNascimento").value || null,
                salario: document.getElementById("salario").value || null
            };

            const endpointPorAba = {
                alunos: "/api/usuarios/alunos",
                professores: "/api/usuarios/professores",
                coordenacao: "/api/usuarios/coordenacao"
            };

            let url;
            let metodo;

            if (modoEdicao) {
                const id = document.getElementById("usuarioId").value;
                url = `/api/usuarios/${id}`;
                metodo = "PUT";
            } else {
                url = endpointPorAba[abaAtual];
                metodo = "POST";
            }

            try {
                const resp = await fetch(url, {
                    method: metodo,
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(dados)
                });

                const res = await resp.json();

                if (!resp.ok) {
                    Swal.fire("Erro", res.message || "Falha ao salvar", "error");
                    return;
                }

                Swal.fire("Sucesso", res.message, "success");
                fecharModal();
                dadosAba[abaAtual] = null;
                carregarAba(abaAtual);

            } catch (e) {
                Swal.fire("Erro", "Falha na conexão", "error");
            }
        }

        // ── Tabela ────────────────────────────────────────────────────────────────
        function renderTabela(usuarios, config) {
            const tbody = document.getElementById("tabelaCorpo");

            if (!usuarios || usuarios.length === 0) {
                mostrarVazio(config.colunas.length);
                return;
            }

            const busca = document.querySelector(".search-box input").value.toLowerCase().trim();
            const filtrados = busca
                ? usuarios.filter(u =>
                    Object.values(u).some(v => String(v).toLowerCase().includes(busca))
                )
                : usuarios;

            if (filtrados.length === 0) {
                mostrarVazio(config.colunas.length, "Nenhum resultado para a busca.");
                return;
            }

            tbody.innerHTML = filtrados.map(u => `
                <tr>
                  ${config.renderLinha(u)}
                  <td>
                    <div class="acoes-cell">
                      <button class="acao-btn acao-ver"  title="Visualizar" data-id="${u.id}">${SVG_VER}</button>
                      <button class="acao-btn acao-edit" title="Editar"     data-id="${u.id}">${SVG_EDIT}</button>
                      <button class="acao-btn acao-del"  title="Excluir"    data-id="${u.id}">${SVG_DEL}</button>
                    </div>
                  </td>
                </tr>
            `).join("");
        }

        async function carregarAba(tab) {
            const config = CONFIG_ABAS[tab];
            atualizarCabecalho(config.colunas);
            document.getElementById("btnNovoAluno").textContent = config.labelNovo;
            mostrarCarregando(config.colunas.length);

            if (dadosAba[tab]) {
                renderTabela(dadosAba[tab], config);
                return;
            }

            const token = getToken();
            if (!token) {
                limparSessao();
                window.location.href = "/";
                return;
            }

            try {
                const resp = await fetch(config.endpoint, {
                    headers: { "Authorization": `Bearer ${token}` }
                });

                if (resp.status === 401 || resp.status === 403) {
                    limparSessao();
                    window.location.href = "/";
                    return;
                }

                if (!resp.ok) {
                    mostrarErro(config.colunas.length, "Erro ao buscar dados.");
                    return;
                }

                const dados = await resp.json();
                dadosAba[tab] = dados.usuarios || [];
                renderTabela(dadosAba[tab], config);

            } catch (erro) {
                console.error("Erro fetch:", erro);
                mostrarErro(config.colunas.length, "Falha na conexão com o servidor.");
            }
        }

        // ── Sair ──────────────────────────────────────────────────────────────────
        async function sair() {
            const confirmacao = await Swal.fire({
                icon: "question",
                title: "Deseja sair?",
                text: "Sua sessão será encerrada.",
                showCancelButton: true,
                confirmButtonText: "Sim, sair",
                cancelButtonText: "Cancelar"
            });
            if (!confirmacao.isConfirmed) return;

            const token = getToken();
            try {
                if (token) {
                    await fetch("/api/logout", {
                        method: "POST",
                        headers: { "Authorization": `Bearer ${token}` }
                    });
                }
            } catch (e) { }

            limparSessao();
            window.location.href = "/";
        }

        // ── Event listeners ───────────────────────────────────────────────────────
        document.getElementById("btnNovoAluno").addEventListener("click", () => {
            modoEdicao = false;
            limparFormulario();

            const labelPorAba = {
                alunos: "Novo aluno",
                professores: "Novo professor",
                coordenacao: "Novo coordenador"
            };
            document.getElementById("tituloModal").textContent = labelPorAba[abaAtual] || "Novo usuário";

            // Especialidade só para professor e coordenação
            const mostrarEspecialidade = abaAtual !== "alunos";
            document.getElementById("grupoEspecialidade").style.display = mostrarEspecialidade ? "block" : "none";
            document.getElementById("grupoSalario").style.display = mostrarEspecialidade ? "block" : "none";

            document.getElementById("modalUsuario").style.display = "flex";
        });

        document.addEventListener("click", async (e) => {
            if (e.target.closest(".acao-ver")) {
                const id = e.target.closest("button").dataset.id;
                const token = getToken();
                try {
                    const resp = await fetch(`/api/usuarios/${id}`, {
                        headers: { "Authorization": `Bearer ${token}` }
                    });
                    const data = await resp.json();
                    const u = data.usuario;

                    const ehAluno = u.papel === "Aluno";

                    Swal.fire({
                        title: u.nome,
                        html: `
                <table style="width:100%;text-align:left;font-size:0.9rem;border-collapse:collapse">
                    <tr><td style="padding:6px 8px;color:#64748b">CPF</td><td style="padding:6px 8px">${u.cpf || "—"}</td></tr>
                    <tr><td style="padding:6px 8px;color:#64748b">E-mail</td><td style="padding:6px 8px">${u.email || "—"}</td></tr>
                    <tr><td style="padding:6px 8px;color:#64748b">Telefone</td><td style="padding:6px 8px">${u.telefone || "—"}</td></tr>
                    <tr><td style="padding:6px 8px;color:#64748b">Nascimento</td><td style="padding:6px 8px">${u.data_nascimento || "—"}</td></tr>
                    ${!ehAluno ? `
                    <tr><td style="padding:6px 8px;color:#64748b">Especialidade</td><td style="padding:6px 8px">${u.especialidade || "—"}</td></tr>
                    <tr><td style="padding:6px 8px;color:#64748b">Salário</td><td style="padding:6px 8px">${u.salario != null ? "R$ " + Number(u.salario).toFixed(2) : "—"}</td></tr>
                    ` : ""}
                </table>
            `,
                        confirmButtonText: "Fechar"
                    });
                } catch (e) {
                    Swal.fire("Erro", "Falha ao carregar dados do usuário.", "error");
                }
            }

            if (e.target.closest(".acao-edit")) {
                const id = e.target.closest("button").dataset.id;
                const token = getToken();
                try {
                    const resp = await fetch(`/api/usuarios/${id}`, {
                        headers: { "Authorization": `Bearer ${token}` }
                    });
                    const data = await resp.json();
                    const u = data.usuario;

                    modoEdicao = true;
                    document.getElementById("usuarioId").value = u.id;
                    document.getElementById("nome").value = u.nome || "";
                    document.getElementById("cpf").value = u.cpf || "";
                    document.getElementById("email").value = u.email || "";
                    document.getElementById("telefone").value = u.telefone || "";
                    document.getElementById("dataNascimento").value = u.data_nascimento || "";
                    document.getElementById("especialidade").value = u.especialidade || "";
                    document.getElementById("tituloModal").textContent = "Editar usuário";

                    const mostrarEspecialidade = u.papel !== "aluno";
                    document.getElementById("grupoEspecialidade").style.display = mostrarEspecialidade ? "block" : "none";
                    document.getElementById("modalUsuario").style.display = "flex";
                    document.getElementById("salario").value = u.salario || "";
                    document.getElementById("grupoEspecialidade").style.display = mostrarEspecialidade ? "block" : "none";
                    document.getElementById("grupoSalario").style.display = mostrarEspecialidade ? "block" : "none";
                } catch (e) {
                    Swal.fire("Erro", "Falha ao carregar dados do usuário.", "error");
                }
            }

            if (e.target.closest(".acao-del")) {
                const id = e.target.closest("button").dataset.id;
                const confirm = await Swal.fire({
                    title: "Excluir usuário?",
                    text: "Essa ação não poderá ser desfeita.",
                    icon: "warning",
                    showCancelButton: true,
                    confirmButtonText: "Sim, excluir"
                });
                if (!confirm.isConfirmed) return;

                const token = getToken();
                try {
                    const resp = await fetch(`/api/usuarios/${id}`, {
                        method: "DELETE",
                        headers: { "Authorization": `Bearer ${token}` }
                    });
                    const res = await resp.json();
                    if (!resp.ok) {
                        Swal.fire("Erro", res.message, "error");
                        return;
                    }
                    Swal.fire("Sucesso", res.message, "success");
                    dadosAba[abaAtual] = null;
                    carregarAba(abaAtual);
                } catch (e) {
                    Swal.fire("Erro", "Falha na conexão", "error");
                }
            }
        });

        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                abaAtual = btn.dataset.tab;
                dadosAba[abaAtual] = null;
                carregarAba(abaAtual);
            });
        });

        document.querySelector(".search-box input").addEventListener("input", () => {
            renderTabela(dadosAba[abaAtual] || [], CONFIG_ABAS[abaAtual]);
        });

        const botaoMenu = document.getElementById("botaoMenuUsuario");
        const menuUsuario = document.getElementById("menuUsuario");
        botaoMenu.addEventListener("click", () => menuUsuario.classList.toggle("show"));
        window.addEventListener("click", e => {
            if (!e.target.closest(".user-menu")) menuUsuario.classList.remove("show");
        });

        document.getElementById("btnEditarPerfil").addEventListener("click", () => {
            window.location.href = "/perfil";
        });

        document.getElementById("btnSair").addEventListener("click", sair);

        // ── Inicialização ─────────────────────────────────────────────────────────
        const usuarioSalvo = (function(){
            try {
                const t = localStorage.getItem('token');
                if (t) {
                    const part = t.split('.')[1];
                    const b64 = part.replace(/-/g,'+').replace(/_/g,'/');
                    const pad = '='.repeat((4 - b64.length % 4) % 4);
                    return JSON.stringify(JSON.parse(atob(b64 + pad)));
                }
            } catch(e){}
            return localStorage.getItem("usuario");
        })();
        if (usuarioSalvo) {
            try {
                const u = JSON.parse(usuarioSalvo);
                document.getElementById("nomeUsuarioTopo").textContent = u.nome;

                // Formatar papel
                function formatarPapel(papel) {
                    const p = String(papel).toLowerCase();
                    if (p === "admin" || p === "adm" || p === "coordenador") {
                        return "Coordenador";
                    }
                    if (p === "professor") return "Professor";
                    if (p === "aluno") return "Aluno";
                    return papel;
                }

                document.getElementById("papelUsuario").textContent = formatarPapel(u.papel);

                // primeira letra do nome no avatar
                const primeiraLetra = u.nome ? u.nome.charAt(0).toUpperCase() : "?";
                document.getElementById("avatarUsuario").textContent = primeiraLetra;

                // Mostrar botão Gestão de usuários apenas para coordenadores
                if (u.papel && (u.papel.toLowerCase() === 'coordenador' || u.papel.toLowerCase() === 'admin' || u.papel.toLowerCase() === 'adm')) {
                    document.getElementById("btnGestaoUsuarios").style.display = "block";
                }
            } catch (e) { }
        }

        carregarAba("alunos");
    </script>

    <script src="/static/js/darkmode.js"></script>

</body>

</html>
