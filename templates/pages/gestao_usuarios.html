<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitora+ | Gestão de Usuários</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="inicio-body gestao-page">

  {% include 'components/sidebar.html' %}

  <main class="inicio-main">

    {% include 'components/header.html' %}
    <script src="/static/react/assets/main.js"></script>

    <section class="usuarios-content">

      <!-- Cabeçalho da seção -->
      <div class="page-heading">
        <div class="page-heading-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div>
          <h2>Gestão de Usuários</h2>
          <p>Gerencie alunos, professores e coordenadores</p>
        </div>
      </div>

      <!-- Toolbar: tabs + botão novo -->
      <div class="toolbar">
        <button class="tab-btn active" data-tab="alunos">Alunos</button>
        <button class="tab-btn" data-tab="professores">Professores</button>
        <button class="tab-btn" data-tab="coordenacao">Coordenação</button>
        <button class="btn-novo" id="btnNovoAluno">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Novo aluno
        </button>
      </div>

      <!-- Table card -->
      <div class="table-card">
        <table class="usuarios-table">
          <thead id="tabelaCabecalho">
            <tr>
              <th>Nome</th>
              <th>CPF</th>
              <th>Turma</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabelaCorpo"></tbody>
        </table>
      </div>

    </section>
  </main>

  <!-- Modal -->
  <div id="modalUsuario" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-header-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <h2 id="tituloModal">Novo usuário</h2>
      </div>

      <input type="hidden" id="usuarioId">

      <div class="campo-grupo">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" placeholder="Ex.: João da Silva" minlength="3">
      </div>

      <div class="campos-grid">
        <div class="campo-grupo">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" placeholder="000.000.000-00" inputmode="numeric" maxlength="14">
        </div>
        <div class="campo-grupo">
          <label for="telefone">Telefone</label>
          <input type="text" id="telefone" placeholder="(00) 00000-0000" inputmode="tel" maxlength="15">
        </div>
      </div>

      <div class="campo-grupo">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="email@exemplo.com">
      </div>

      <div class="campo-grupo">
        <label for="dataNascimento">Data de nascimento</label>
        <input type="date" id="dataNascimento">
        <small style="display:block;margin-top:6px;color:var(--muted);font-size:0.78rem;">
          A senha inicial usa a data de nascimento no formato DDMMAA.
        </small>
      </div>

      <div id="grupoEspecialidade" class="campo-grupo">
        <label for="especialidade">Especialidade</label>
        <input type="text" id="especialidade" placeholder="Ex.: Matemática" minlength="3">
      </div>

      <div id="grupoSalario" class="campo-grupo">
        <label for="salario">Salário (R$)</label>
        <input type="text" id="salario" placeholder="0,00" inputmode="decimal">
      </div>

      <div class="modal-actions">
        <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
        <button class="btn-salvar"   onclick="salvarUsuario()">Salvar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/static/js/componentes.js"></script>

  <script>
    let modoEdicao = false;
    let abaAtual = "alunos";
    let dadosAba = {};
    let papelModalAtual = "aluno";
    let estadoOriginalModal = null;

    const SVG_VER  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const SVG_EDIT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
    const SVG_DEL  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;

    const CONFIG_ABAS = {
      alunos: {
        endpoint: "/api/usuarios/alunos",
        colunas: ["Nome", "CPF", "Turma", "Ações"],
        labelNovo: "Novo aluno",
        renderLinha: (u) => `
          <td>
            <div class="cell-nome">
              <div class="row-avatar">${u.nome ? u.nome.charAt(0).toUpperCase() : "?"}</div>
              <span class="row-nome-label">${u.nome}</span>
            </div>
          </td>
          <td>${u.cpf ? formatarCpf(u.cpf) : "—"}</td>
          <td>${u.turma ? `<span class="badge-turma">${u.turma}</span>` : "—"}</td>`
      },
      coordenacao: {
        endpoint: "/api/usuarios/coordenacao",
        colunas: ["Nome", "E-mail", "Telefone", "Ações"],
        labelNovo: "Novo coordenador",
        renderLinha: (u) => `
          <td>
            <div class="cell-nome">
              <div class="row-avatar">${u.nome ? u.nome.charAt(0).toUpperCase() : "?"}</div>
              <span class="row-nome-label">${u.nome}</span>
            </div>
          </td>
          <td>${u.email || "—"}</td>
          <td>${u.telefone ? formatarTelefone(u.telefone) : "—"}</td>`
      },
      professores: {
        endpoint: "/api/usuarios/professores",
        colunas: ["Nome", "CPF", "Especialidade", "Ações"],
        labelNovo: "Novo professor",
        renderLinha: (u) => `
          <td>
            <div class="cell-nome">
              <div class="row-avatar">${u.nome ? u.nome.charAt(0).toUpperCase() : "?"}</div>
              <span class="row-nome-label">${u.nome}</span>
            </div>
          </td>
          <td>${u.cpf ? formatarCpf(u.cpf) : "—"}</td>
          <td>${u.especialidade || "—"}</td>`
      }
    };

    function getToken() { return localStorage.getItem("token"); }
    function limparSessao() {
      localStorage.removeItem("token");
      localStorage.removeItem("usuario");
      localStorage.removeItem("sessaoExpiracao");
    }

    function mostrarCarregando(n) {
      document.getElementById("tabelaCorpo").innerHTML =
        `<tr class="estado-linha"><td colspan="${n}">
          <i class="ph ph-circle-notch estado-icon"></i>
          Carregando...
        </td></tr>`;
    }
    function mostrarVazio(n, msg = "Nenhum registro encontrado.") {
      document.getElementById("tabelaCorpo").innerHTML =
        `<tr class="estado-linha"><td colspan="${n}">
          <i class="ph ph-users estado-icon"></i>
          ${msg}
        </td></tr>`;
    }
    function mostrarErro(n, msg = "Erro ao carregar dados.") {
      document.getElementById("tabelaCorpo").innerHTML =
        `<tr class="estado-linha"><td colspan="${n}" style="color:#e55353">
          <i class="ph ph-warning-circle estado-icon"></i>
          ${msg}
        </td></tr>`;
    }
    function atualizarCabecalho(colunas) {
      document.getElementById("tabelaCabecalho").innerHTML =
        `<tr>${colunas.map(c => `<th>${c}</th>`).join("")}</tr>`;
    }

    function somenteNumeros(v) { return String(v || "").replace(/\D/g, ""); }
    function formatarCpf(v) {
      const n = somenteNumeros(v).slice(0, 11);
      if (n.length <= 3) return n;
      if (n.length <= 6) return `${n.slice(0, 3)}.${n.slice(3)}`;
      if (n.length <= 9) return `${n.slice(0, 3)}.${n.slice(3, 6)}.${n.slice(6)}`;
      return `${n.slice(0, 3)}.${n.slice(3, 6)}.${n.slice(6, 9)}-${n.slice(9)}`;
    }
    function formatarTelefone(v) {
      const n = somenteNumeros(v).slice(0, 11);
      if (n.length <= 2) return n;
      if (n.length <= 6) return `(${n.slice(0, 2)})${n.slice(2)}`;
      if (n.length <= 10) return `(${n.slice(0, 2)})${n.slice(2, 6)}-${n.slice(6)}`;
      return `(${n.slice(0, 2)})${n.slice(2, 7)}-${n.slice(7)}`;
    }
    function telefoneValido(v) {
      const n = somenteNumeros(v);
      return n.length === 10 || n.length === 11;
    }
    function emailValido(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(v || "").trim());
    }
    function cpfValido(v) {
      const cpf = somenteNumeros(v);
      if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;

      let soma = 0;
      for (let i = 0; i < 9; i += 1) soma += Number(cpf[i]) * (10 - i);
      let digito1 = (soma * 10) % 11;
      if (digito1 === 10) digito1 = 0;

      soma = 0;
      for (let i = 0; i < 10; i += 1) soma += Number(cpf[i]) * (11 - i);
      let digito2 = (soma * 10) % 11;
      if (digito2 === 10) digito2 = 0;

      return cpf.slice(-2) === `${digito1}${digito2}`;
    }
    function parseSalario(valor) {
      let texto = String(valor || "").trim();
      if (!texto) return null;

      texto = texto.replace(/\s/g, "").replace(/^R\$\s*/i, "");
      if (texto.includes(",") && texto.includes(".")) {
        texto = texto.replace(/\./g, "").replace(",", ".");
      } else {
        texto = texto.replace(",", ".");
      }

      const numero = Number(texto);
      if (!Number.isFinite(numero) || numero < 0) return null;
      return Number(numero.toFixed(2));
    }
    function normalizarTextoSalario(valor) {
      const texto = String(valor || "").replace(/[^\d,.-]/g, "").replace(/\./g, ",");
      const partes = texto.split(",");
      const inteiro = (partes.shift() || "").replace(/\D/g, "");
      const decimal = partes.join("").replace(/\D/g, "").slice(0, 2);
      if (!inteiro && !decimal) return "";
      return decimal || texto.includes(",") ? `${inteiro || "0"},${decimal}` : inteiro;
    }
    function formatarSalario(valor) {
      const numero = parseSalario(valor);
      return numero == null ? "" : numero.toFixed(2).replace(".", ",");
    }
    function tipoUsuarioDaAba(aba) {
      if (aba === "professores") return "professor";
      if (aba === "coordenacao") return "coordenador";
      return "aluno";
    }
    function ehCampoProfissional(papel) {
      return String(papel || "").toLowerCase() !== "aluno";
    }
    function idadeEmAnos(dataIso) {
      if (!dataIso) return null;
      const dataNascimento = new Date(`${dataIso}T00:00:00`);
      if (Number.isNaN(dataNascimento.getTime())) return null;

      const hoje = new Date();
      let idade = hoje.getFullYear() - dataNascimento.getFullYear();
      const aniversarioNaoChegou =
        hoje.getMonth() < dataNascimento.getMonth() ||
        (hoje.getMonth() === dataNascimento.getMonth() && hoje.getDate() < dataNascimento.getDate());

      if (aniversarioNaoChegou) idade -= 1;
      return idade;
    }
    function idadeValidaParaPapel(dataIso, papel) {
      const idade = idadeEmAnos(dataIso);
      if (idade == null) return false;
      return String(papel || "").toLowerCase() === "aluno" ? idade > 12 : idade > 18;
    }
    function senhaInicialPorData(dataIso) {
      if (!dataIso || !/^\d{4}-\d{2}-\d{2}$/.test(dataIso)) return "";
      const [ano, mes, dia] = dataIso.split("-");
      return `${dia}${mes}${ano.slice(-2)}`;
    }
    function obterDadosFormulario() {
      return {
        nome: document.getElementById("nome").value,
        cpf: document.getElementById("cpf").value,
        email: document.getElementById("email").value,
        telefone: document.getElementById("telefone").value,
        especialidade: document.getElementById("especialidade").value,
        data_nascimento: document.getElementById("dataNascimento").value || null,
        salario: document.getElementById("salario").value || null
      };
    }
    function normalizarDadosUsuario(dados, papel = papelModalAtual) {
      const tipo = String(papel || "").toLowerCase();
      const salarioNormalizado = parseSalario(dados.salario);
      return {
        nome: String(dados.nome || "").trim(),
        cpf: somenteNumeros(dados.cpf),
        email: String(dados.email || "").trim().toLowerCase(),
        telefone: somenteNumeros(dados.telefone),
        data_nascimento: dados.data_nascimento || null,
        especialidade: ehCampoProfissional(tipo) ? (String(dados.especialidade || "").trim() || null) : null,
        salario: ehCampoProfissional(tipo) && salarioNormalizado != null ? salarioNormalizado.toFixed(2) : null
      };
    }
    function validarDadosUsuario(dados, papel = papelModalAtual) {
      const tipo = String(papel || "").toLowerCase();
      const salarioNumero = parseSalario(dados.salario);

      if (String(dados.nome || "").trim().length < 3) {
        Swal.fire("Atenção", "O nome deve ter no mínimo 3 caracteres.", "warning");
        return false;
      }
      if (!cpfValido(dados.cpf)) {
        Swal.fire("Atenção", "Informe um CPF válido.", "warning");
        return false;
      }
      if (!emailValido(dados.email)) {
        Swal.fire("Atenção", "Informe um e-mail válido.", "warning");
        return false;
      }
      if (!telefoneValido(dados.telefone)) {
        Swal.fire("Atenção", "Informe um telefone válido com DDD.", "warning");
        return false;
      }
      if (!dados.data_nascimento) {
        Swal.fire("Atenção", "Informe a data de nascimento.", "warning");
        return false;
      }
      if (!idadeValidaParaPapel(dados.data_nascimento, tipo)) {
        Swal.fire(
          "Atenção",
          tipo === "aluno"
            ? "Alunos devem ter mais de 12 anos."
            : "Professores e coordenadores devem ter mais de 18 anos.",
          "warning"
        );
        return false;
      }
      if (ehCampoProfissional(tipo)) {
        if (String(dados.especialidade || "").trim().length < 3) {
          Swal.fire("Atenção", "A especialidade deve ter no mínimo 3 caracteres.", "warning");
          return false;
        }
        if (salarioNumero == null) {
          Swal.fire("Atenção", "Informe um salário válido no formato 0,00.", "warning");
          return false;
        }
      }
      return true;
    }
    function aplicarVisibilidadeCamposProfissionais(papel) {
      const mostrar = ehCampoProfissional(papel);
      document.getElementById("grupoEspecialidade").style.display = mostrar ? "flex" : "none";
      document.getElementById("grupoSalario").style.display = mostrar ? "flex" : "none";
    }
    function abrirModalNovo() {
      modoEdicao = false;
      papelModalAtual = tipoUsuarioDaAba(abaAtual);
      estadoOriginalModal = null;
      limparFormulario();
      const labels = { alunos: "Novo aluno", professores: "Novo professor", coordenacao: "Novo coordenador" };
      document.getElementById("tituloModal").textContent = labels[abaAtual] || "Novo usuário";
      aplicarVisibilidadeCamposProfissionais(papelModalAtual);
      document.getElementById("modalUsuario").style.display = "flex";
    }
    function fecharModal() {
      estadoOriginalModal = null;
      document.getElementById("modalUsuario").style.display = "none";
    }
    function limparFormulario() {
      ["usuarioId","nome","cpf","email","telefone","dataNascimento","especialidade","salario"]
        .forEach(id => { document.getElementById(id).value = ""; });
    }

    function renderTabela(usuarios, config) {
      if (!usuarios || usuarios.length === 0) { mostrarVazio(config.colunas.length); return; }
      const busca = document.querySelector(".inicio-header .search-box input")?.value.toLowerCase().trim() || "";
      const filtrados = busca
        ? usuarios.filter(u => Object.values(u).some(v => String(v).toLowerCase().includes(busca)))
        : usuarios;
      if (filtrados.length === 0) { mostrarVazio(config.colunas.length, "Nenhum resultado para a busca."); return; }

      document.getElementById("tabelaCorpo").innerHTML = filtrados.map(u => `
        <tr>
          ${config.renderLinha(u)}
          <td>
            <div class="acoes-cell">
              <button class="acao-btn acao-ver"  title="Visualizar" data-id="${u.id}">${SVG_VER}</button>
              <button class="acao-btn acao-edit" title="Editar"     data-id="${u.id}">${SVG_EDIT}</button>
              <button class="acao-btn acao-del"  title="Excluir"    data-id="${u.id}">${SVG_DEL}</button>
            </div>
          </td>
        </tr>`).join("");
    }

    async function carregarAba(tab) {
      const config = CONFIG_ABAS[tab];
      atualizarCabecalho(config.colunas);
      const btnNovo = document.getElementById("btnNovoAluno");
      btnNovo.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> ${config.labelNovo}`;
      mostrarCarregando(config.colunas.length);
      if (dadosAba[tab]) { renderTabela(dadosAba[tab], config); return; }
      const token = getToken();
      if (!token) { limparSessao(); window.location.href = "/"; return; }
      try {
        const resp = await fetch(config.endpoint, { headers: { "Authorization": `Bearer ${token}` } });
        if (resp.status === 401 || resp.status === 403) { limparSessao(); window.location.href = "/"; return; }
        if (!resp.ok) { mostrarErro(config.colunas.length, "Erro ao buscar dados."); return; }
        const dados = await resp.json();
        dadosAba[tab] = dados.usuarios || [];
        renderTabela(dadosAba[tab], config);
      } catch { mostrarErro(config.colunas.length, "Falha na conexão com o servidor."); }
    }

    async function salvarUsuario() {
      const token = getToken();
      const dados = obterDadosFormulario();
      if (!validarDadosUsuario(dados, papelModalAtual)) return;

      const dadosNormalizados = normalizarDadosUsuario(dados, papelModalAtual);
      if (modoEdicao && estadoOriginalModal && JSON.stringify(dadosNormalizados) === JSON.stringify(estadoOriginalModal)) {
        Swal.fire("Atenção", "Nenhuma informação foi alterada.", "info");
        return;
      }

      const payload = {
        nome: dadosNormalizados.nome,
        cpf: formatarCpf(dadosNormalizados.cpf),
        email: dadosNormalizados.email,
        telefone: formatarTelefone(dadosNormalizados.telefone),
        especialidade: dadosNormalizados.especialidade,
        data_nascimento: dadosNormalizados.data_nascimento,
        salario: dadosNormalizados.salario ? dadosNormalizados.salario.replace(".", ",") : null
      };
      const endpoints = { alunos: "/api/usuarios/alunos", professores: "/api/usuarios/professores", coordenacao: "/api/usuarios/coordenacao" };
      const id     = document.getElementById("usuarioId").value;
      const url    = modoEdicao ? `/api/usuarios/${id}` : endpoints[abaAtual];
      const metodo = modoEdicao ? "PUT" : "POST";
      try {
        const resp = await fetch(url, {
          method: metodo,
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
          body: JSON.stringify(payload)
        });
        const res = await resp.json();
        if (!resp.ok) { Swal.fire("Erro", res.message || "Falha ao salvar", "error"); return; }
        if (res.alterado === false) {
          Swal.fire("Atenção", res.message || "Nenhuma informação foi alterada.", "info");
          return;
        }
        const senhaInicial = res.senha_inicial || (!modoEdicao ? senhaInicialPorData(dadosNormalizados.data_nascimento) : "");
        Swal.fire({
          icon: "success",
          title: "Sucesso",
          html: senhaInicial
            ? `${res.message}<br><br><strong>${modoEdicao ? "Nova senha:" : "Senha inicial:"}</strong> ${senhaInicial}`
            : res.message
        });
        fecharModal();
        estadoOriginalModal = null;
        dadosAba[abaAtual] = null;
        carregarAba(abaAtual);
      } catch { Swal.fire("Erro", "Falha na conexão", "error"); }
    }

    async function sair() {
      const c = await Swal.fire({
        icon: "question", title: "Deseja sair?", text: "Sua sessão será encerrada.",
        showCancelButton: true, confirmButtonText: "Sim, sair", cancelButtonText: "Cancelar"
      });
      if (!c.isConfirmed) return;
      try { if (getToken()) await fetch("/api/logout", { method: "POST", headers: { "Authorization": `Bearer ${getToken()}` } }); } catch {}
      limparSessao();
      window.location.href = "/";
    }

    // Botão novo
    document.getElementById("btnNovoAluno").addEventListener("click", () => {
      abrirModalNovo();
    });

    // Ações na tabela
    document.addEventListener("click", async (e) => {
      if (e.target.closest(".acao-ver")) {
        const id = e.target.closest("button").dataset.id;
        try {
          const resp = await fetch(`/api/usuarios/${id}`, { headers: { "Authorization": `Bearer ${getToken()}` } });
          const data = await resp.json();
          const u = data.usuario;
          const ehAluno = String(u.papel || "").toLowerCase() === "aluno";
          Swal.fire({
            title: u.nome,
            html: `<table style="width:100%;text-align:left;font-size:0.9rem;border-collapse:collapse">
              <tr><td style="padding:7px 10px;color:#7a96a8;font-weight:600;font-size:0.8rem;text-transform:uppercase;letter-spacing:.04em">CPF</td><td style="padding:7px 10px">${u.cpf ? formatarCpf(u.cpf) : "—"}</td></tr>
              <tr style="background:rgba(147,215,223,0.05)"><td style="padding:7px 10px;color:#7a96a8;font-weight:600;font-size:0.8rem;text-transform:uppercase;letter-spacing:.04em">E-mail</td><td style="padding:7px 10px">${u.email || "—"}</td></tr>
              <tr><td style="padding:7px 10px;color:#7a96a8;font-weight:600;font-size:0.8rem;text-transform:uppercase;letter-spacing:.04em">Telefone</td><td style="padding:7px 10px">${u.telefone ? formatarTelefone(u.telefone) : "—"}</td></tr>
              <tr style="background:rgba(147,215,223,0.05)"><td style="padding:7px 10px;color:#7a96a8;font-weight:600;font-size:0.8rem;text-transform:uppercase;letter-spacing:.04em">Nascimento</td><td style="padding:7px 10px">${u.data_nascimento || "—"}</td></tr>
              ${!ehAluno ? `
              <tr><td style="padding:7px 10px;color:#7a96a8;font-weight:600;font-size:0.8rem;text-transform:uppercase;letter-spacing:.04em">Especialidade</td><td style="padding:7px 10px">${u.especialidade || "—"}</td></tr>
              <tr style="background:rgba(147,215,223,0.05)"><td style="padding:7px 10px;color:#7a96a8;font-weight:600;font-size:0.8rem;text-transform:uppercase;letter-spacing:.04em">Salário</td><td style="padding:7px 10px">${u.salario != null ? "R$ " + Number(u.salario).toFixed(2) : "—"}</td></tr>` : ""}
            </table>`,
            confirmButtonText: "Fechar"
          });
        } catch { Swal.fire("Erro", "Falha ao carregar dados do usuário.", "error"); }
      }

      if (e.target.closest(".acao-edit")) {
        const id = e.target.closest("button").dataset.id;
        try {
          const resp = await fetch(`/api/usuarios/${id}`, { headers: { "Authorization": `Bearer ${getToken()}` } });
          const data = await resp.json();
          const u = data.usuario;
          modoEdicao = true;
          papelModalAtual = String(u.papel || "").toLowerCase();
          document.getElementById("usuarioId").value      = u.id;
          document.getElementById("nome").value           = u.nome || "";
          document.getElementById("cpf").value            = formatarCpf(u.cpf || "");
          document.getElementById("email").value          = u.email || "";
          document.getElementById("telefone").value       = formatarTelefone(u.telefone || "");
          document.getElementById("dataNascimento").value = u.data_nascimento || "";
          document.getElementById("especialidade").value  = u.especialidade || "";
          document.getElementById("salario").value        = formatarSalario(u.salario);
          document.getElementById("tituloModal").textContent = "Editar usuário";
          aplicarVisibilidadeCamposProfissionais(papelModalAtual);
          estadoOriginalModal = normalizarDadosUsuario({
            nome: u.nome || "",
            cpf: u.cpf || "",
            email: u.email || "",
            telefone: u.telefone || "",
            especialidade: u.especialidade || "",
            data_nascimento: u.data_nascimento || null,
            salario: u.salario != null ? Number(u.salario).toFixed(2).replace(".", ",") : null
          }, papelModalAtual);
          document.getElementById("modalUsuario").style.display = "flex";
        } catch { Swal.fire("Erro", "Falha ao carregar dados do usuário.", "error"); }
      }

      if (e.target.closest(".acao-del")) {
        const id = e.target.closest("button").dataset.id;
        const c = await Swal.fire({
          title: "Excluir usuário?", text: "Essa ação não poderá ser desfeita.",
          icon: "warning", showCancelButton: true, confirmButtonText: "Sim, excluir"
        });
        if (!c.isConfirmed) return;
        try {
          const resp = await fetch(`/api/usuarios/${id}`, { method: "DELETE", headers: { "Authorization": `Bearer ${getToken()}` } });
          const res = await resp.json();
          if (!resp.ok) { Swal.fire("Erro", res.message, "error"); return; }
          Swal.fire("Sucesso", res.message, "success");
          dadosAba[abaAtual] = null;
          carregarAba(abaAtual);
        } catch { Swal.fire("Erro", "Falha na conexão", "error"); }
      }
    });

    // Tabs
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        abaAtual = btn.dataset.tab;
        dadosAba[abaAtual] = null;
        carregarAba(abaAtual);
      });
    });

    // Busca
    document.querySelector(".inicio-header .search-box input")?.addEventListener("input", () => {
      renderTabela(dadosAba[abaAtual] || [], CONFIG_ABAS[abaAtual]);
    });
    document.getElementById("cpf").addEventListener("input", (e) => {
      e.target.value = formatarCpf(e.target.value);
    });
    document.getElementById("telefone").addEventListener("input", (e) => {
      e.target.value = formatarTelefone(e.target.value);
    });
    document.getElementById("salario").addEventListener("input", (e) => {
      e.target.value = normalizarTextoSalario(e.target.value);
    });
    document.getElementById("salario").addEventListener("blur", (e) => {
      e.target.value = formatarSalario(e.target.value);
    });

    carregarAba("alunos");
  </script>

  <script src="/static/js/darkmode.js"></script>

</body>
</html>
