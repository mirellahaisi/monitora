<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitora+ | Gestão de Usuários</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    /* ── Design tokens ── */
    :root {
      --accent:     #4caebe;
      --teal:       #57dbbd;
      --teal-light: #93d7df;
      --dark:       #173c4a;
      --mid:        #34445c;
      --text:       #436077;
      --muted:      #7a96a8;
      --bg:         #f5fafa;
      --white:      #ffffff;
      --grad:       linear-gradient(135deg, #93d7df 0%, #57dbbd 55%, #4caebe 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "DM Sans", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout principal ── */
    .inicio-body {
      display: flex;
      min-height: 100vh;
      background: var(--bg);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px;
      height: calc(100vh - 24px);
      position: sticky;
      top: 12px;
      margin: 12px 0 12px 12px;
      padding: 24px 14px;
      border-radius: 20px;
      background: var(--grad);
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      box-shadow: 0 8px 32px rgba(87,219,189,0.25);
      overflow-y: auto;
    }

    /* ── Main ── */
    .inicio-main {
      flex: 1;
      padding: 28px 36px;
      min-width: 0;
    }

    /* ── Header ── */
    .inicio-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-box svg {
      position: absolute;
      left: 14px;
      width: 16px; height: 16px;
      color: var(--muted);
      pointer-events: none;
    }
    .search-box input {
      width: 260px;
      height: 38px;
      border: 1.5px solid rgba(147,215,223,0.35);
      border-radius: 10px;
      padding: 0 18px 0 38px;
      background: var(--white);
      outline: none;
      font: inherit;
      font-size: 0.88rem;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(76,190,190,0.1);
    }
    .search-box input::placeholder { color: #a8bfcc; }

    .user-menu { position: relative; display: flex; align-items: center; }
    .user-menu-button {
      border: none; background: var(--white); cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      padding: 7px 14px 7px 7px; border-radius: 999px;
      box-shadow: 0 2px 12px rgba(76,190,190,0.15);
      color: var(--mid); transition: box-shadow 0.2s;
    }
    .user-menu-button:hover { box-shadow: 0 4px 18px rgba(76,190,190,0.22); }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--grad); color: white;
      display: flex; align-items: center; justify-content: center;
      font-family: "Sora", sans-serif; font-weight: 700; font-size: 0.9rem;
    }
    .user-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.15; }
    .user-text span { font-size: 0.72rem; font-weight: 600; color: var(--accent); }
    .user-text strong { font-size: 0.88rem; font-weight: 700; color: var(--mid); }
    .user-arrow { font-size: 12px; color: var(--muted); }
    .user-dropdown {
      display: none; position: absolute; top: 48px; right: 0;
      min-width: 180px; background: var(--white); border-radius: 14px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.12); padding: 8px; z-index: 100;
    }
    .user-dropdown.show { display: block; }
    .user-dropdown button {
      width: 100%; border: none; background: transparent;
      padding: 10px 12px; text-align: left; border-radius: 8px;
      cursor: pointer; font: inherit; font-size: 0.88rem; color: var(--text);
    }
    .user-dropdown button:hover { background: var(--bg); color: var(--accent); }

    /* ── Page heading ── */
    .usuarios-content { max-width: 960px; }

    .page-heading {
      display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
    }
    .page-heading-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--grad); display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(87,219,189,0.3); flex-shrink: 0;
    }
    .page-heading-icon svg { width: 22px; height: 22px; color: white; }
    .page-heading h2 {
      font-family: "Sora", sans-serif; font-size: 1.5rem; font-weight: 800;
      color: var(--dark); letter-spacing: -0.025em;
    }
    .page-heading p { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

    /* ── Tabs ── */
    .tabs-bar {
      display: flex; gap: 6px; margin-bottom: 20px;
    }
    .tab-btn {
      height: 38px; padding: 0 20px;
      border: 1.5px solid rgba(147,215,223,0.35);
      border-radius: 10px; background: var(--white);
      color: var(--muted); font: inherit; font-size: 0.86rem; font-weight: 600;
      cursor: pointer; transition: all 0.18s;
    }
    .tab-btn:hover {
      border-color: var(--accent); color: var(--accent);
      background: rgba(76,190,190,0.05);
    }
    .tab-btn.active {
      background: var(--grad); border-color: transparent;
      color: white; box-shadow: 0 4px 14px rgba(87,219,189,0.3);
    }

    /* ── Table card ── */
    .table-card {
      background: var(--white); border: 1.5px solid rgba(147,215,223,0.25);
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 4px 20px rgba(76,190,190,0.08);
    }

    .btn-novo {
      height: 38px; padding: 0 20px; border: none; border-radius: 10px;
      background: var(--grad); color: white; font: inherit;
      font-size: 0.88rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 14px rgba(87,219,189,0.3);
      transition: opacity 0.2s, transform 0.15s;
      display: flex; align-items: center; gap: 7px;
    }
    .btn-novo:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── Tabela ── */
    .usuarios-table { width: 100%; border-collapse: collapse; }
    .usuarios-table thead {
      background: linear-gradient(90deg, rgba(147,215,223,0.12) 0%, rgba(87,219,189,0.08) 100%);
    }
    .usuarios-table th {
      height: 46px; padding: 0 20px; color: var(--mid);
      font-family: "Sora", sans-serif; font-size: 0.78rem; font-weight: 700;
      text-align: left; letter-spacing: 0.04em; text-transform: uppercase;
      border-bottom: 1.5px solid rgba(147,215,223,0.25);
    }
    .usuarios-table td {
      height: 56px; padding: 0 20px; color: var(--text);
      font-size: 0.92rem; border-bottom: 1px solid rgba(147,215,223,0.13);
      vertical-align: middle;
    }
    .usuarios-table tr:last-child td { border-bottom: none; }
    .usuarios-table tbody tr { transition: background 0.15s; }
    .usuarios-table tbody tr:hover { background: rgba(147,215,223,0.06); }

    .estado-linha td {
      text-align: center !important;
      padding: 48px 20px !important;
      color: var(--muted); font-size: 0.92rem;
    }

    /* ── Ações ── */
    .acoes-cell { display: flex; align-items: center; gap: 6px; }
    .acao-btn {
      width: 32px; height: 32px;
      border: 1.5px solid rgba(147,215,223,0.35);
      border-radius: 8px; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); transition: all 0.18s;
    }
    .acao-btn svg { width: 15px; height: 15px; }
    .acao-btn:hover { background: rgba(147,215,223,0.15); color: var(--mid); border-color: var(--teal-light); }
    .acao-ver:hover  { color: var(--accent); }
    .acao-edit:hover { color: var(--dark); }
    .acao-del:hover  { color: #e74c3c; border-color: rgba(231,76,60,0.3); background: rgba(231,76,60,0.06); }

    /* ── Modal overlay ── */
    #modalUsuario {
      position: fixed; inset: 0;
      background: rgba(23,60,74,0.45);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }
    .modal-content {
      background: var(--white); border-radius: 20px;
      padding: 32px; width: 100%; max-width: 460px;
      box-shadow: 0 20px 60px rgba(23,60,74,0.2);
      display: flex; flex-direction: column; gap: 14px;
    }
    .modal-content h2 {
      font-family: "Sora", sans-serif; font-size: 1.2rem; font-weight: 800;
      color: var(--dark); margin-bottom: 4px;
    }
    .modal-content input {
      width: 100%; height: 44px;
      border: 1.5px solid rgba(147,215,223,0.4); border-radius: 10px;
      padding: 0 14px; background: var(--bg); color: var(--mid);
      font: inherit; font-size: 0.92rem; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .modal-content input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(76,190,190,0.1);
      background: var(--white);
    }
    .modal-content input::placeholder { color: #a8bfcc; }

    .modal-actions { display: flex; gap: 10px; margin-top: 4px; }
    .btn-cancelar {
      flex: 1; height: 44px;
      border: 1.5px solid rgba(147,215,223,0.4); border-radius: 10px;
      background: var(--bg); color: var(--muted);
      font: inherit; font-size: 0.92rem; font-weight: 600;
      cursor: pointer; transition: background 0.18s, color 0.18s;
    }
    .btn-cancelar:hover { background: rgba(147,215,223,0.15); color: var(--mid); }
    .btn-salvar {
      flex: 1; height: 44px; border: none; border-radius: 10px;
      background: var(--grad); color: white;
      font: inherit; font-size: 0.92rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 14px rgba(87,219,189,0.3);
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-salvar:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── Responsive ── */
    @media (max-width: 800px) {
      .inicio-body { flex-direction: column; }
      .sidebar { width: auto; min-height: auto; margin: 10px; flex-direction: row; flex-wrap: wrap; justify-content: center; }
      .inicio-main { padding: 20px 16px; }
      .inicio-header { flex-direction: column; align-items: flex-start; gap: 14px; margin-bottom: 24px; }
      .table-card-top { flex-direction: column; gap: 10px; align-items: flex-start; }
      .search-box input, .table-card-top .search-box input { width: 100%; }
      .modal-content { margin: 16px; padding: 24px; }
      .tabs-bar { flex-wrap: wrap; }
    }
  </style>
</head>

<body class="inicio-body">

  {% include 'components/sidebar.html' %}

  <main class="inicio-main">

    {% include 'components/header.html' %}

    <section class="usuarios-content">

      <!-- Cabeçalho da seção -->
      <div class="page-heading">
        <div class="page-heading-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div>
          <h2>Gestão de Usuários</h2>
          <p>Gerencie alunos, professores e coordenadores</p>
        </div>
      </div>

      <!-- Tabs + botão novo -->
      <div class="tabs-bar">
        <button class="tab-btn active" data-tab="alunos">Alunos</button>
        <button class="tab-btn" data-tab="professores">Professores</button>
        <button class="tab-btn" data-tab="coordenacao">Coordenação</button>
        <button class="btn-novo" id="btnNovoAluno" style="margin-left:auto;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Novo aluno
        </button>
      </div>

      <!-- Table card -->
      <div class="table-card">
        <table class="usuarios-table">
          <thead id="tabelaCabecalho">
            <tr>
              <th>Nome</th>
              <th>CPF</th>
              <th>Turma</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabelaCorpo"></tbody>
        </table>
      </div>

    </section>
  </main>

  <!-- Modal -->
  <div id="modalUsuario" style="display:none;">
    <div class="modal-content">
      <h2 id="tituloModal">Novo usuário</h2>
      <input type="hidden" id="usuarioId">
      <input type="text"   id="nome"          placeholder="Nome completo">
      <input type="text"   id="cpf"           placeholder="CPF">
      <input type="email"  id="email"         placeholder="E-mail">
      <input type="text"   id="telefone"      placeholder="Telefone">
      <input type="date"   id="dataNascimento">
      <div id="grupoEspecialidade">
        <input type="text" id="especialidade" placeholder="Especialidade">
      </div>
      <div id="grupoSalario">
        <input type="number" id="salario" placeholder="Salário" step="0.01" min="0">
      </div>
      <div class="modal-actions">
        <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
        <button class="btn-salvar"   onclick="salvarUsuario()">Salvar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="/static/js/componentes.js"></script>

  <script>
    let modoEdicao = false;
    let abaAtual = "alunos";
    let dadosAba = {};

    const SVG_VER  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const SVG_EDIT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
    const SVG_DEL  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;

    const CONFIG_ABAS = {
      alunos: {
        endpoint: "/api/usuarios/alunos",
        colunas: ["Nome", "CPF", "Turma", "Ações"],
        labelNovo: "Novo aluno",
        renderLinha: (u) => `<td>${u.nome}</td><td>${u.cpf || "—"}</td><td>${u.turma || "—"}</td>`
      },
      coordenacao: {
        endpoint: "/api/usuarios/coordenacao",
        colunas: ["Nome", "E-mail", "Telefone", "Ações"],
        labelNovo: "Novo coordenador",
        renderLinha: (u) => `<td>${u.nome}</td><td>${u.email || "—"}</td><td>${u.telefone || "—"}</td>`
      },
      professores: {
        endpoint: "/api/usuarios/professores",
        colunas: ["Nome", "CPF", "Especialidade", "Ações"],
        labelNovo: "Novo professor",
        renderLinha: (u) => `<td>${u.nome}</td><td>${u.cpf || "—"}</td><td>${u.especialidade || "—"}</td>`
      }
    };

    function getToken() { return localStorage.getItem("token"); }
    function limparSessao() {
      localStorage.removeItem("token");
      localStorage.removeItem("usuario");
      localStorage.removeItem("sessaoExpiracao");
    }

    function mostrarCarregando(n) {
      document.getElementById("tabelaCorpo").innerHTML =
        `<tr class="estado-linha"><td colspan="${n}"><i class="ph ph-circle-notch" style="margin-right:6px;"></i>Carregando...</td></tr>`;
    }
    function mostrarVazio(n, msg = "Nenhum registro encontrado.") {
      document.getElementById("tabelaCorpo").innerHTML =
        `<tr class="estado-linha"><td colspan="${n}">${msg}</td></tr>`;
    }
    function mostrarErro(n, msg = "Erro ao carregar dados.") {
      document.getElementById("tabelaCorpo").innerHTML =
        `<tr class="estado-linha"><td colspan="${n}" style="color:#e74c3c">${msg}</td></tr>`;
    }
    function atualizarCabecalho(colunas) {
      document.getElementById("tabelaCabecalho").innerHTML =
        `<tr>${colunas.map(c => `<th>${c}</th>`).join("")}</tr>`;
    }

    function fecharModal() { document.getElementById("modalUsuario").style.display = "none"; }
    function limparFormulario() {
      ["usuarioId","nome","cpf","email","telefone","dataNascimento","especialidade","salario"]
        .forEach(id => { document.getElementById(id).value = ""; });
    }

    async function salvarUsuario() {
      const token = getToken();
      const dados = {
        nome:            document.getElementById("nome").value,
        cpf:             document.getElementById("cpf").value,
        email:           document.getElementById("email").value,
        telefone:        document.getElementById("telefone").value,
        especialidade:   document.getElementById("especialidade").value,
        data_nascimento: document.getElementById("dataNascimento").value || null,
        salario:         document.getElementById("salario").value || null
      };
      const endpoints = { alunos: "/api/usuarios/alunos", professores: "/api/usuarios/professores", coordenacao: "/api/usuarios/coordenacao" };
      const id = document.getElementById("usuarioId").value;
      const url    = modoEdicao ? `/api/usuarios/${id}` : endpoints[abaAtual];
      const metodo = modoEdicao ? "PUT" : "POST";
      try {
        const resp = await fetch(url, {
          method: metodo,
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
          body: JSON.stringify(dados)
        });
        const res = await resp.json();
        if (!resp.ok) { Swal.fire("Erro", res.message || "Falha ao salvar", "error"); return; }
        Swal.fire("Sucesso", res.message, "success");
        fecharModal();
        dadosAba[abaAtual] = null;
        carregarAba(abaAtual);
      } catch (e) { Swal.fire("Erro", "Falha na conexão", "error"); }
    }

    function renderTabela(usuarios, config) {
      if (!usuarios || usuarios.length === 0) { mostrarVazio(config.colunas.length); return; }
      const busca = document.querySelector(".inicio-header .search-box input").value.toLowerCase().trim();
      const filtrados = busca
        ? usuarios.filter(u => Object.values(u).some(v => String(v).toLowerCase().includes(busca)))
        : usuarios;
      if (filtrados.length === 0) { mostrarVazio(config.colunas.length, "Nenhum resultado para a busca."); return; }
      document.getElementById("tabelaCorpo").innerHTML = filtrados.map(u => `
        <tr>
          ${config.renderLinha(u)}
          <td><div class="acoes-cell">
            <button class="acao-btn acao-ver"  title="Visualizar" data-id="${u.id}">${SVG_VER}</button>
            <button class="acao-btn acao-edit" title="Editar"     data-id="${u.id}">${SVG_EDIT}</button>
            <button class="acao-btn acao-del"  title="Excluir"    data-id="${u.id}">${SVG_DEL}</button>
          </div></td>
        </tr>`).join("");
    }

    async function carregarAba(tab) {
      const config = CONFIG_ABAS[tab];
      atualizarCabecalho(config.colunas);
      const btnNovo = document.getElementById("btnNovoAluno");
      btnNovo.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> ${config.labelNovo}`;
      mostrarCarregando(config.colunas.length);
      if (dadosAba[tab]) { renderTabela(dadosAba[tab], config); return; }
      const token = getToken();
      if (!token) { limparSessao(); window.location.href = "/"; return; }
      try {
        const resp = await fetch(config.endpoint, { headers: { "Authorization": `Bearer ${token}` } });
        if (resp.status === 401 || resp.status === 403) { limparSessao(); window.location.href = "/"; return; }
        if (!resp.ok) { mostrarErro(config.colunas.length, "Erro ao buscar dados."); return; }
        const dados = await resp.json();
        dadosAba[tab] = dados.usuarios || [];
        renderTabela(dadosAba[tab], config);
      } catch { mostrarErro(config.colunas.length, "Falha na conexão com o servidor."); }
    }

    async function sair() {
      const c = await Swal.fire({
        icon: "question", title: "Deseja sair?", text: "Sua sessão será encerrada.",
        showCancelButton: true, confirmButtonText: "Sim, sair", cancelButtonText: "Cancelar"
      });
      if (!c.isConfirmed) return;
      try { if (getToken()) await fetch("/api/logout", { method: "POST", headers: { "Authorization": `Bearer ${getToken()}` } }); } catch {}
      limparSessao();
      window.location.href = "/";
    }

    // Event listeners
    document.getElementById("btnNovoAluno").addEventListener("click", () => {
      modoEdicao = false;
      limparFormulario();
      const labels = { alunos: "Novo aluno", professores: "Novo professor", coordenacao: "Novo coordenador" };
      document.getElementById("tituloModal").textContent = labels[abaAtual] || "Novo usuário";
      const extra = abaAtual !== "alunos";
      document.getElementById("grupoEspecialidade").style.display = extra ? "block" : "none";
      document.getElementById("grupoSalario").style.display       = extra ? "block" : "none";
      document.getElementById("modalUsuario").style.display = "flex";
    });

    document.addEventListener("click", async (e) => {
      if (e.target.closest(".acao-ver")) {
        const id = e.target.closest("button").dataset.id;
        try {
          const resp = await fetch(`/api/usuarios/${id}`, { headers: { "Authorization": `Bearer ${getToken()}` } });
          const data = await resp.json();
          const u = data.usuario;
          const ehAluno = String(u.papel || "").toLowerCase() === "aluno";
          Swal.fire({
            title: u.nome,
            html: `<table style="width:100%;text-align:left;font-size:0.9rem;border-collapse:collapse">
              <tr><td style="padding:6px 8px;color:#7a96a8">CPF</td><td style="padding:6px 8px">${u.cpf || "—"}</td></tr>
              <tr><td style="padding:6px 8px;color:#7a96a8">E-mail</td><td style="padding:6px 8px">${u.email || "—"}</td></tr>
              <tr><td style="padding:6px 8px;color:#7a96a8">Telefone</td><td style="padding:6px 8px">${u.telefone || "—"}</td></tr>
              <tr><td style="padding:6px 8px;color:#7a96a8">Nascimento</td><td style="padding:6px 8px">${u.data_nascimento || "—"}</td></tr>
              ${!ehAluno ? `<tr><td style="padding:6px 8px;color:#7a96a8">Especialidade</td><td style="padding:6px 8px">${u.especialidade || "—"}</td></tr>
              <tr><td style="padding:6px 8px;color:#7a96a8">Salário</td><td style="padding:6px 8px">${u.salario != null ? "R$ " + Number(u.salario).toFixed(2) : "—"}</td></tr>` : ""}
            </table>`,
            confirmButtonText: "Fechar"
          });
        } catch { Swal.fire("Erro", "Falha ao carregar dados do usuário.", "error"); }
      }

      if (e.target.closest(".acao-edit")) {
        const id = e.target.closest("button").dataset.id;
        try {
          const resp = await fetch(`/api/usuarios/${id}`, { headers: { "Authorization": `Bearer ${getToken()}` } });
          const data = await resp.json();
          const u = data.usuario;
          modoEdicao = true;
          document.getElementById("usuarioId").value      = u.id;
          document.getElementById("nome").value           = u.nome || "";
          document.getElementById("cpf").value            = u.cpf || "";
          document.getElementById("email").value          = u.email || "";
          document.getElementById("telefone").value       = u.telefone || "";
          document.getElementById("dataNascimento").value = u.data_nascimento || "";
          document.getElementById("especialidade").value  = u.especialidade || "";
          document.getElementById("salario").value        = u.salario || "";
          document.getElementById("tituloModal").textContent = "Editar usuário";
          const extra = String(u.papel || "").toLowerCase() !== "aluno";
          document.getElementById("grupoEspecialidade").style.display = extra ? "block" : "none";
          document.getElementById("grupoSalario").style.display       = extra ? "block" : "none";
          document.getElementById("modalUsuario").style.display = "flex";
        } catch { Swal.fire("Erro", "Falha ao carregar dados do usuário.", "error"); }
      }

      if (e.target.closest(".acao-del")) {
        const id = e.target.closest("button").dataset.id;
        const c = await Swal.fire({
          title: "Excluir usuário?", text: "Essa ação não poderá ser desfeita.",
          icon: "warning", showCancelButton: true, confirmButtonText: "Sim, excluir"
        });
        if (!c.isConfirmed) return;
        try {
          const resp = await fetch(`/api/usuarios/${id}`, { method: "DELETE", headers: { "Authorization": `Bearer ${getToken()}` } });
          const res = await resp.json();
          if (!resp.ok) { Swal.fire("Erro", res.message, "error"); return; }
          Swal.fire("Sucesso", res.message, "success");
          dadosAba[abaAtual] = null;
          carregarAba(abaAtual);
        } catch { Swal.fire("Erro", "Falha na conexão", "error"); }
      }
    });

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        abaAtual = btn.dataset.tab;
        dadosAba[abaAtual] = null;
        carregarAba(abaAtual);
      });
    });

    document.querySelector(".inicio-header .search-box input").addEventListener("input", () => {
      renderTabela(dadosAba[abaAtual] || [], CONFIG_ABAS[abaAtual]);
    });

    const botaoMenu   = document.getElementById("botaoMenuUsuario");
    const menuUsuario = document.getElementById("menuUsuario");
    botaoMenu.addEventListener("click", () => menuUsuario.classList.toggle("show"));
    window.addEventListener("click", e => { if (!e.target.closest(".user-menu")) menuUsuario.classList.remove("show"); });
    document.getElementById("btnEditarPerfil").addEventListener("click", () => { window.location.href = "/perfil"; });
    document.getElementById("btnSair").addEventListener("click", sair);

    // Inicialização
    const usuarioSalvo = (function(){
      try {
        const t = localStorage.getItem("token");
        if (t) {
          const part = t.split(".")[1];
          const b64  = part.replace(/-/g,"+").replace(/_/g,"/");
          const pad  = "=".repeat((4 - b64.length % 4) % 4);
          return JSON.stringify(JSON.parse(atob(b64 + pad)));
        }
      } catch(e){}
      return localStorage.getItem("usuario");
    })();

    if (usuarioSalvo) {
      try {
        const u = JSON.parse(usuarioSalvo);
        document.getElementById("nomeUsuarioTopo").textContent = u.nome;
        document.getElementById("avatarUsuario").textContent   = u.nome ? u.nome.charAt(0).toUpperCase() : "?";
        function formatarPapel(papel) {
          const p = String(papel).toLowerCase();
          if (["admin","adm","coordenador"].includes(p)) return "Coordenador";
          if (p === "professor") return "Professor";
          if (p === "aluno")     return "Aluno";
          return papel;
        }
        document.getElementById("papelUsuario").textContent = formatarPapel(u.papel);
      } catch {}
    }

    carregarAba("alunos");
  </script>

  <script src="/static/js/darkmode.js"></script>

</body>
</html>
