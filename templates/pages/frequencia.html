<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitora+ | Frequência</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --accent:     #4caebe;
      --teal:       #57dbbd;
      --teal-light: #93d7df;
      --dark:       #173c4a;
      --mid:        #34445c;
      --text:       #436077;
      --muted:      #7a96a8;
      --bg:         #f5fafa;
      --white:      #ffffff;
      --grad:       linear-gradient(135deg, #93d7df 0%, #57dbbd 55%, #4caebe 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "DM Sans", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .inicio-body { display: flex; min-height: 100vh; background: var(--bg); align-items: stretch; }

    /* SIDEBAR */
    .sidebar {
      width: 200px; min-height: 100%;
      margin: 12px; padding: 24px 14px;
      border-radius: 20px; background: var(--grad);
      display: flex; flex-direction: column; align-items: center;
      flex-shrink: 0; box-shadow: 0 8px 32px rgba(87,219,189,0.25);
    }
    .sidebar-brand { text-align: center; margin-bottom: 28px; }
    .sidebar-logo { width: 72px; height: 72px; object-fit: contain; }
    .sidebar-brand h1 {
      margin: 6px 0 0; font-family: "Sora", sans-serif;
      font-size: 1.25rem; font-weight: 700; color: var(--dark); letter-spacing: -0.02em;
    }
    .sidebar-brand h1 span { color: rgba(23,60,74,0.55); }
    .sidebar-menu { width: 100%; display: flex; flex-direction: column; gap: 4px; }
    .sidebar-link {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      color: rgba(255,255,255,0.85); font-size: 0.86rem; font-weight: 500;
      text-decoration: none; transition: background 0.18s, color 0.18s;
      display: flex; align-items: center; gap: 8px;
    }
    .sidebar-link svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-link.active, .sidebar-link:hover {
      background: rgba(255,255,255,0.92); color: var(--mid);
    }
    .logout-button {
      margin-top: auto; width: 100%; padding: 10px 14px;
      border: 0; background: transparent; color: rgba(255,255,255,0.7);
      font: inherit; font-size: 0.86rem; text-align: left; cursor: pointer;
      border-radius: 10px; display: flex; align-items: center; gap: 8px;
      transition: background 0.18s, color 0.18s;
    }
    .logout-button svg { width: 16px; height: 16px; }
    .logout-button:hover { background: rgba(255,255,255,0.15); color: white; }
    .sidebar-bottom { width: 100%; margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .sidebar-laptop svg { width: 80px; opacity: 0.7; }

    /* MAIN */
    .inicio-main { flex: 1; padding: 28px 36px; min-width: 0; display: flex; flex-direction: column; }

    /* HEADER */
    .inicio-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;
    }
    .search-box input {
      width: 260px; height: 38px; border: 1.5px solid rgba(147,215,223,0.35);
      border-radius: 50px; padding: 0 18px; background: var(--white);
      outline: none; font: inherit; font-size: 0.88rem; color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(76,190,190,0.1); }
    .search-box input::placeholder { color: #a8bfcc; }
    .user-menu { position: relative; display: flex; align-items: center; }
    .user-menu-button {
      border: none; background: var(--white); cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      padding: 7px 14px 7px 7px; border-radius: 999px;
      box-shadow: 0 2px 12px rgba(76,190,190,0.15); color: var(--mid);
      transition: box-shadow 0.2s;
    }
    .user-menu-button:hover { box-shadow: 0 4px 18px rgba(76,190,190,0.22); }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--grad); color: white;
      display: flex; align-items: center; justify-content: center;
      font-family: "Sora", sans-serif; font-weight: 700; font-size: 0.9rem;
    }
    .user-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.15; }
    .user-text span { font-size: 0.72rem; font-weight: 600; color: var(--accent); }
    .user-text strong { font-size: 0.88rem; font-weight: 700; color: var(--mid); }
    .user-arrow { font-size: 12px; color: var(--muted); }
    .user-dropdown {
      display: none; position: absolute; top: 48px; right: 0;
      min-width: 180px; background: var(--white); border-radius: 14px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.12); padding: 8px; z-index: 100;
    }
    .user-dropdown.show { display: block; }
    .user-dropdown button {
      width: 100%; border: none; background: transparent;
      padding: 10px 12px; text-align: left; border-radius: 8px;
      cursor: pointer; font: inherit; font-size: 0.88rem; color: var(--text);
    }
    .user-dropdown button:hover { background: var(--bg); color: var(--accent); }

    /* PAGE HEADING */
    .freq-content {
      width: 100%;
      max-width: 960px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .page-heading { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
    .page-heading-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--grad); display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(87,219,189,0.3); flex-shrink: 0;
    }
    .page-heading-icon svg { width: 22px; height: 22px; color: white; }
    .page-heading h2 {
      font-family: "Sora", sans-serif; font-size: 1.5rem;
      font-weight: 800; color: var(--dark); letter-spacing: -0.025em;
    }
    .page-heading p { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

    /* FILTROS */
    .notas-filtros {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.1fr) minmax(0, 1fr) auto;
      align-items: end;
      gap: 14px;
      background: var(--white); border: 1.5px solid rgba(147,215,223,0.3);
      border-radius: 16px; padding: 18px 24px; margin-bottom: 28px;
      box-shadow: 0 2px 12px rgba(76,190,190,0.07);
    }
    .filtro-group { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .filtro-group label {
      font-size: 0.75rem; font-weight: 600; color: var(--muted);
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .notas-filtros select {
      width: 100%;
      min-width: 0;
      height: 44px; border: 1.5px solid rgba(147,215,223,0.4);
      border-radius: 10px; background: var(--bg); color: var(--mid);
      font: inherit; font-size: 0.92rem; font-weight: 500;
      padding: 0 14px; outline: none;
      appearance: auto;
      transition: border-color 0.2s, box-shadow 0.2s; cursor: pointer;
    }
    .notas-filtros select:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(76,190,190,0.1);
    }
    .notas-filtros select:disabled {
      opacity: 1;
      cursor: not-allowed;
      color: #b8cdd6;
      border-color: rgba(147,215,223,0.2);
      background: rgba(245,250,250,0.7);
    }

    .btn-limpar {
      height: 44px; padding: 0 18px; border-radius: 10px;
      border: 1.5px solid rgba(147,215,223,0.4); background: var(--bg);
      color: var(--muted); font: inherit; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: background 0.18s, color 0.18s; white-space: nowrap;
    }
    .btn-limpar:hover { background: rgba(147,215,223,0.15); color: var(--mid); }

    /* RESULTADO */
    .freq-result-area { width: 100%; display: flex; flex-direction: column; gap: 18px; flex: 1; }

    .freq-card {
      background: var(--white);
      border: 1.5px solid rgba(147,215,223,0.25);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(76,190,190,0.08);
      display: flex;
      gap: 0;
      width: 100%;
    }

    .freq-info {
      flex: 1;
      min-width: 0;
      padding: 32px 40px;
      border-right: 1.5px solid rgba(147,215,223,0.18);
    }

    .freq-nome {
      font-family: "Sora", sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.02em;
      margin-bottom: 3px;
    }

    .freq-sub {
      font-size: 0.86rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .freq-stats { display: flex; flex-direction: column; gap: 0; max-width: 420px; }

    .freq-stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 0;
      border-bottom: 1px solid rgba(147,215,223,0.13);
      font-size: 0.92rem;
    }
    .freq-stat-row:last-child { border-bottom: none; }

    .freq-stat-row span { color: var(--text); font-weight: 400; }
    .freq-stat-row strong { font-size: 1rem; font-weight: 700; color: var(--mid); }

    .freq-val-green { color: #1a8c6e !important; }
    .freq-val-red   { color: #c0392b !important; }

    .freq-stat-highlight {
      border-bottom: none !important;
      padding: 13px 0 0 !important;
    }
    .freq-stat-highlight span {
      font-weight: 600 !important;
      color: var(--mid) !important;
    }
    .freq-stat-highlight strong {
      font-size: 1.15rem !important;
      font-weight: 800 !important;
      color: var(--accent) !important;
    }

    /* Donut */
    .freq-chart-col {
      width: 240px;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .freq-donut {
      --pct: 75;
      width: 148px; height: 148px;
      border-radius: 50%;
      background: conic-gradient(
        var(--teal) 0% calc(var(--pct) * 1%),
        #f0a070 calc(var(--pct) * 1%) 100%
      );
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(87,219,189,0.22);
    }

    .freq-donut-inner {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: var(--white);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    .freq-donut-pct {
      font-family: "Sora", sans-serif;
      font-size: 1.35rem; font-weight: 800;
      color: var(--dark);
      line-height: 1;
    }

    .freq-donut-label {
      font-size: 0.65rem; color: var(--muted);
      font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; margin-top: 3px;
    }

    .freq-legend { display: flex; flex-direction: column; gap: 7px; width: 100%; padding: 0 4px; }
    .freq-legend-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.83rem; color: var(--text); font-weight: 500;
    }
    .freq-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .freq-dot-green  { background: var(--teal); }
    .freq-dot-orange { background: #f0a070; }

    .btn-publicar {
      width: 100%;
      height: 44px; padding: 0 20px; border: none; border-radius: 10px;
      background: var(--grad); color: white; font: inherit; font-size: 0.88rem;
      font-weight: 700; cursor: pointer; display: flex; align-items: center;
      justify-content: center;
      gap: 8px; box-shadow: 0 4px 16px rgba(87,219,189,0.3);
      transition: opacity 0.2s, transform 0.15s; text-decoration: none;
      white-space: nowrap;
    }
    .btn-publicar:hover { opacity: 0.9; transform: translateY(-1px); }

    /* VAZIO */
    .freq-empty {
      background: var(--white);
      border: 1.5px solid rgba(147,215,223,0.25);
      border-radius: 16px;
      padding: 60px 40px;
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
      box-shadow: 0 4px 20px rgba(76,190,190,0.06);
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .freq-empty i { display: block; margin-bottom: 14px; }

    /* Alerta de reprovação */
    .freq-alert {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; border-radius: 12px;
      font-size: 0.88rem; font-weight: 600;
    }
    .freq-alert-danger {
      background: rgba(255,107,107,0.1);
      border: 1px solid rgba(255,107,107,0.3);
      color: #c0392b;
    }
    .freq-alert-ok {
      background: rgba(87,219,189,0.1);
      border: 1px solid rgba(87,219,189,0.3);
      color: #1a8c6e;
    }

    @media (max-width: 800px) {
      .inicio-body { flex-direction: column; }
      .sidebar { width: auto; min-height: auto; margin: 10px; flex-direction: row; flex-wrap: wrap; justify-content: center; }
      .inicio-main { padding: 20px 16px; }
      .inicio-header { flex-direction: column; align-items: flex-start; gap: 14px; margin-bottom: 24px; }
      .search-box input { width: 100%; }
      .freq-content { max-width: 100%; }
      .notas-filtros { grid-template-columns: 1fr; }
      .btn-limpar { width: 100%; justify-content: center; }
      .freq-card { flex-direction: column; }
      .freq-chart-col { width: 100%; border-top: 1.5px solid rgba(147,215,223,0.2); border-right: none !important; }
      .freq-info { border-right: none; }
    }
  </style>
</head>

<body class="inicio-body">

{% include 'components/sidebar.html' %}

<main class="inicio-main">

  {% include 'components/header.html' %}

  <section class="freq-content">

    <div class="page-heading">
      <div class="page-heading-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="9 11 12 14 22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
      </div>
      <div>
        <h2>Frequência do Aluno</h2>
        <p>Selecione a matéria, turma e aluno para visualizar a frequência</p>
      </div>
    </div>

    <div class="notas-filtros">
      <div class="filtro-group">
        <label for="selectMateria">Matéria</label>
        <select id="selectMateria">
          <option value="">Selecione a matéria</option>
        </select>
      </div>
      <div class="filtro-group">
        <label for="selectTurma">Turma / Período</label>
        <select id="selectTurma" disabled>
          <option value="">Selecione a turma</option>
        </select>
      </div>
      <div class="filtro-group">
        <label for="selectAluno">Aluno</label>
        <select id="selectAluno" disabled>
          <option value="">Selecione o aluno</option>
        </select>
      </div>
      <button type="button" class="btn-limpar" id="btnLimpar">
        <i class="ph ph-x-circle"></i> Limpar
      </button>
    </div>

    <div class="freq-result-area" id="freqResultArea">
      <div class="freq-empty" id="freqEmpty">
        <i class="ph ph-magnifying-glass" style="font-size:3.5rem; opacity:0.3;"></i>
        <p>Selecione matéria, turma e aluno para visualizar a frequência.</p>
      </div>
    </div>

  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  const selectMateria = document.getElementById("selectMateria");
  const selectTurma   = document.getElementById("selectTurma");
  const selectAluno   = document.getElementById("selectAluno");
  const btnLimpar     = document.getElementById("btnLimpar");
  const freqResultArea = document.getElementById("freqResultArea");
  const freqEmpty     = document.getElementById("freqEmpty");

  const nomeUsuarioTopo  = document.getElementById("nomeUsuarioTopo");
  const papelUsuario     = document.getElementById("papelUsuario");
  const avatarUsuario    = document.getElementById("avatarUsuario");
  const botaoMenuUsuario = document.getElementById("botaoMenuUsuario");
  const menuUsuario      = document.getElementById("menuUsuario");
  const btnEditarPerfil  = document.getElementById("btnEditarPerfil");
  const btnSair          = document.getElementById("btnSair");

  function getToken() { return localStorage.getItem("token"); }
  function limparSessao() {
    localStorage.removeItem("token");
    localStorage.removeItem("usuario");
    localStorage.removeItem("sessaoExpiracao");
  }
  function tokenExpirado(exp) { return Number(exp) < Math.floor(Date.now() / 1000); }
  function verificarToken() {
    const exp = localStorage.getItem("sessaoExpiracao");
    if (!getToken() || !exp || tokenExpirado(exp)) {
      limparSessao(); window.location.href = "/"; return false;
    }
    return true;
  }
  function formatarPapel(papel) {
    const p = String(papel).toLowerCase();
    if (["admin","adm","coordenador"].includes(p)) return "Coordenador";
    if (p === "professor") return "Professor";
    if (p === "aluno") return "Aluno";
    return papel;
  }

  async function carregarUsuarioLogado() {
    if (!verificarToken()) return;
    try {
      const r = await fetch("/api/usuario-logado", { headers: { "Authorization": `Bearer ${getToken()}` } });
      if (!r.ok) { limparSessao(); window.location.href = "/"; return; }
      const { usuario } = await r.json();
      if (nomeUsuarioTopo) nomeUsuarioTopo.textContent = usuario.nome;
      if (papelUsuario)    papelUsuario.textContent    = formatarPapel(usuario.papel);
      if (avatarUsuario)   avatarUsuario.textContent   = usuario.nome.charAt(0).toUpperCase();
      const btnGestao = document.getElementById("btnGestaoUsuarios");
      if (btnGestao && ["coordenador","admin","adm"].includes(usuario.papel.toLowerCase()))
        btnGestao.style.display = "block";
    } catch { limparSessao(); window.location.href = "/"; }
  }

  async function carregarMaterias() {
    try {
      const r = await fetch("/api/frequencia/materias");
      const lista = await r.json();
      selectMateria.innerHTML = `<option value="">Selecione a matéria</option>`;
      lista.forEach(m => {
        selectMateria.innerHTML += `<option value="${m.id}">${m.nome}</option>`;
      });
    } catch { console.error("Erro ao carregar matérias"); }
  }

  async function carregarTurmas() {
    const materiaId = selectMateria.value;
    selectTurma.innerHTML = `<option value="">Selecione a turma</option>`;
    selectTurma.disabled = true;
    selectAluno.innerHTML = `<option value="">Selecione o aluno</option>`;
    selectAluno.disabled = true;
    mostrarVazio();
    if (!materiaId) return;
    try {
      const r = await fetch(`/api/frequencia/turmas?materia_id=${materiaId}`);
      const lista = await r.json();
      lista.forEach(t => {
        selectTurma.innerHTML += `<option value="${t.id}">${t.nome} — ${t.periodo}º Período</option>`;
      });
      selectTurma.disabled = false;
    } catch { console.error("Erro ao carregar turmas"); }
  }

  async function carregarAlunos() {
    const turmaId = selectTurma.value;
    selectAluno.innerHTML = `<option value="">Selecione o aluno</option>`;
    selectAluno.disabled = true;
    mostrarVazio();
    if (!turmaId) return;
    try {
      const r = await fetch(`/api/frequencia/alunos?turma_id=${turmaId}`);
      const lista = await r.json();
      lista.forEach(a => {
        selectAluno.innerHTML += `<option value="${a.id}">${a.nome}</option>`;
      });
      selectAluno.disabled = false;
    } catch { console.error("Erro ao carregar alunos"); }
  }

  async function carregarFrequencia() {
    const materiaId = selectMateria.value;
    const turmaId   = selectTurma.value;
    const alunoId   = selectAluno.value;
    if (!materiaId || !turmaId || !alunoId) { mostrarVazio(); return; }

    try {
      const r = await fetch(`/api/frequencia/dados?aluno_id=${alunoId}&materia_id=${materiaId}&turma_id=${turmaId}`);
      const dados = await r.json();
      renderizarResultado(dados);
    } catch { console.error("Erro ao carregar frequência"); }
  }

  function mostrarVazio() {
    freqResultArea.innerHTML = `
      <div class="freq-empty">
        <i class="ph ph-magnifying-glass" style="font-size:3.5rem; opacity:0.3;"></i>
        <p>Selecione matéria, turma e aluno para visualizar a frequência.</p>
      </div>`;
  }

  function renderizarResultado(d) {
    const pct = d.presenca_raw;
    const statusClass = pct >= 75 ? "freq-alert-ok" : "freq-alert-danger";
    const statusIcon  = pct >= 75 ? "ph-check-circle" : "ph-warning";
    const statusMsg   = pct >= 75
      ? "Frequência regular — acima do mínimo exigido (75%)"
      : `Frequência insuficiente — abaixo do mínimo exigido (75%)`;

    const materiaId = selectMateria.value;
    const turmaId   = selectTurma.value;
    const alunoId   = selectAluno.value;

    freqResultArea.innerHTML = `
      <div class="freq-alert ${statusClass}">
        <i class="ph ${statusIcon}" style="font-size:1.2rem;"></i>
        ${statusMsg}
      </div>

      <div class="freq-card">
        <div class="freq-info">
          <h3 class="freq-nome">${d.nome}</h3>
          <p class="freq-sub">${d.materia} &mdash; ${d.turma}</p>

          <div class="freq-stats">
            <div class="freq-stat-row">
              <span>Total de Aulas</span>
              <strong>${d.total}</strong>
            </div>
            <div class="freq-stat-row">
              <span>Presenças</span>
              <strong class="freq-val-green">${d.presencas}</strong>
            </div>
            <div class="freq-stat-row">
              <span>Faltas</span>
              <strong class="freq-val-red">${d.faltas}</strong>
            </div>
            <div class="freq-stat-row freq-stat-highlight">
              <span>Frequência</span>
              <strong>${d.presenca}</strong>
            </div>
          </div>
        </div>

        <div class="freq-chart-col">
          <div class="freq-donut" style="--pct: ${pct}">
            <div class="freq-donut-inner">
              <span class="freq-donut-pct">${d.presenca}</span>
              <span class="freq-donut-label">Frequência</span>
            </div>
          </div>

          <div class="freq-legend">
            <div class="freq-legend-item">
              <span class="freq-dot freq-dot-green"></span> Presenças
            </div>
            <div class="freq-legend-item">
              <span class="freq-dot freq-dot-orange"></span> Faltas
            </div>
          </div>

          <a class="btn-publicar"
             href="/frequencia/relatorio?aluno=${alunoId}&materia=${materiaId}&turma=${turmaId}">
            <i class="ph ph-download-simple"></i> Baixar relatório
          </a>
        </div>
      </div>`;
  }

  function limparFiltros() {
    selectMateria.value = "";
    selectTurma.innerHTML = `<option value="">Selecione a turma</option>`;
    selectTurma.disabled = true;
    selectAluno.innerHTML = `<option value="">Selecione o aluno</option>`;
    selectAluno.disabled = true;
    mostrarVazio();
  }

  async function sair() {
    const c = await Swal.fire({
      icon: "question", title: "Deseja sair?", text: "Sua sessão será encerrada.",
      showCancelButton: true, confirmButtonText: "Sim, sair", cancelButtonText: "Cancelar"
    });
    if (!c.isConfirmed) return;
    limparSessao(); window.location.href = "/";
  }

  selectMateria.addEventListener("change", carregarTurmas);
  selectTurma.addEventListener("change", carregarAlunos);
  selectAluno.addEventListener("change", carregarFrequencia);
  btnLimpar.addEventListener("click", limparFiltros);

  if (botaoMenuUsuario) botaoMenuUsuario.addEventListener("click", () => menuUsuario.classList.toggle("show"));
  if (btnEditarPerfil)  btnEditarPerfil.addEventListener("click", () => window.location.href = "/perfil");
  if (btnSair) btnSair.addEventListener("click", sair);

  carregarUsuarioLogado();
  carregarMaterias();
</script>

<script src="/static/js/darkmode.js"></script>

</body>
</html>
