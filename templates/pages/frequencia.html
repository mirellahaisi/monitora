<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitora+ | Frequencia</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="inicio-body freq-page">

{% include 'components/sidebar.html' %}

<main class="inicio-main">

  {% include 'components/header.html' %}
  <script src="/static/react/assets/main.js"></script>

  <section class="freq-content">

    <div class="page-heading">
      <div class="page-heading-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="9 11 12 14 22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
      </div>
      <div>
        <h2 id="pageHeadingTitle">Frequencia do Aluno</h2>
        <p id="pageHeadingDesc">Selecione curso, materia, turma e aluno para visualizar a frequencia</p>
      </div>
    </div>

    <div class="notas-filtros filtro-oculto" id="filtrosAdmin">
      <div class="filtro-group" id="grupoCurso" style="display:none;">
        <label for="selectCurso">Curso</label>
        <select id="selectCurso" disabled>
          <option value="">Selecione o curso</option>
        </select>
      </div>
      <div class="filtro-group">
        <label for="selectMateria">Materia</label>
        <select id="selectMateria">
          <option value="">Selecione a materia</option>
        </select>
      </div>
      <div class="filtro-group">
        <label for="selectTurma">Turma / Periodo</label>
        <select id="selectTurma" disabled>
          <option value="">Selecione a turma</option>
        </select>
      </div>
      <div class="filtro-group">
        <label for="selectAluno">Aluno</label>
        <select id="selectAluno" disabled>
          <option value="">Selecione o aluno</option>
        </select>
      </div>
      <div class="filtro-group filtro-group--btn">
        <label aria-hidden="true">&nbsp;</label>
        <button type="button" class="btn-limpar" id="btnLimpar">
          <i class="ph ph-x-circle"></i> Limpar
        </button>
      </div>
    </div>

    <div class="aluno-frequencia-toolbar filtro-oculto" id="filtrosAlunoFreq">
      <div class="turmas-filtros aluno-frequencia-custom-filtros">
        <div class="filtro-custom" id="wrapOrdenacaoFreq">
          <button class="filtro-custom-btn" id="btnOrdenacaoFreq" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;flex-shrink:0">
              <path d="M3 7h18"/><path d="M6 12h12"/><path d="M10 17h4"/>
            </svg>
            <span id="lblOrdenacaoFreq">Materia em ordem alfabetica</span>
          </button>
          <div class="filtro-custom-dropdown" id="dropOrdenacaoFreq">
            <button class="filtro-custom-option selected" type="button" data-value="alfabetica">Materia em ordem alfabetica</button>
            <button class="filtro-custom-option" type="button" data-value="freq-asc">Frequencia menor para maior</button>
            <button class="filtro-custom-option" type="button" data-value="freq-desc">Frequencia maior para menor</button>
          </div>
        </div>
        <div class="filtro-custom filtro-custom--materia" id="wrapMateriaAlunoFreq">
          <button class="filtro-custom-btn" id="btnMateriaAlunoFreq" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;flex-shrink:0">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"/>
            </svg>
            <span id="lblMateriaAlunoFreq">Todas as materias</span>
          </button>
          <div class="filtro-custom-dropdown" id="dropMateriaAlunoFreq">
            <input type="search" class="filtro-custom-search" id="inputBuscaMateriaAlunoFreq" placeholder="Pesquisar materia">
            <div id="opcoesMateriaAlunoFreq"></div>
          </div>
        </div>
        <select id="selectOrdenacaoFreq" style="display:none">
          <option value="alfabetica">Materia em ordem alfabetica</option>
          <option value="freq-asc">Frequencia menor para maior</option>
          <option value="freq-desc">Frequencia maior para menor</option>
        </select>
        <select id="selectMateriaAluno" style="display:none">
          <option value="">Todas as materias</option>
        </select>
      </div>
    </div>

    <div class="freq-result-area" id="freqResultArea">
      <div class="freq-empty" id="freqEmpty">
        <i class="ph ph-magnifying-glass" style="font-size:3.5rem; opacity:0.3;"></i>
        <p>Selecione curso, materia, turma e aluno para visualizar a frequencia.</p>
      </div>
    </div>

  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/static/js/searchable-select.js"></script>
<script>
  const t = texto => window.MonitoraI18n?.t?.(texto) || texto;
  const selectCurso = document.getElementById("selectCurso");
  const selectMateria = document.getElementById("selectMateria");
  const selectTurma = document.getElementById("selectTurma");
  const selectAluno = document.getElementById("selectAluno");
  const btnLimpar = document.getElementById("btnLimpar");
  const filtrosAlunoFreq = document.getElementById("filtrosAlunoFreq");
  const selectOrdenacaoFreq = document.getElementById("selectOrdenacaoFreq");
  const selectMateriaAluno = document.getElementById("selectMateriaAluno");
  const wrapOrdenacaoFreq = document.getElementById("wrapOrdenacaoFreq");
  const btnOrdenacaoFreq = document.getElementById("btnOrdenacaoFreq");
  const lblOrdenacaoFreq = document.getElementById("lblOrdenacaoFreq");
  const wrapMateriaAlunoFreq = document.getElementById("wrapMateriaAlunoFreq");
  const btnMateriaAlunoFreq = document.getElementById("btnMateriaAlunoFreq");
  const lblMateriaAlunoFreq = document.getElementById("lblMateriaAlunoFreq");
  const inputBuscaMateriaAlunoFreq = document.getElementById("inputBuscaMateriaAlunoFreq");
  const opcoesMateriaAlunoFreq = document.getElementById("opcoesMateriaAlunoFreq");
  const freqResultArea = document.getElementById("freqResultArea");
  const filtrosAdmin = document.getElementById("filtrosAdmin");
  const grupoCurso = document.getElementById("grupoCurso");

  let filtroCursoAtivo = false;
  let frequenciaAlunoDados = null;
  let materiasAlunoFiltro = [];

  function getToken() {
    return localStorage.getItem("token");
  }

  function limparSessao() {
    localStorage.removeItem("token");
    localStorage.removeItem("usuario");
    localStorage.removeItem("sessaoExpiracao");
  }

  function tokenExpirado(exp) {
    return Number(exp) < Math.floor(Date.now() / 1000);
  }

  function verificarToken() {
    const exp = localStorage.getItem("sessaoExpiracao");
    if (!getToken() || !exp || tokenExpirado(exp)) {
      limparSessao();
      window.location.href = "/";
      return false;
    }
    return true;
  }

  function getAuthHeaders() {
    return { "Authorization": `Bearer ${getToken()}` };
  }

  function formatarPapel(papel) {
    const valor = String(papel).toLowerCase();
    if (["admin", "adm", "coordenador"].includes(valor)) return "Coordenador";
    if (valor === "professor") return "Professor";
    if (valor === "aluno") return "Aluno";
    return papel;
  }

  function isAluno(usuario) {
    return Number(usuario.papel_id) === 3
      || Number(usuario.fk_papel_id) === 3
      || Number(usuario.papel) === 3
      || String(usuario.papel || "").toLowerCase() === "aluno";
  }

  function isCoordenador(usuario) {
    return ["coordenador", "admin", "adm"].includes(String(usuario?.papel || "").toLowerCase());
  }

  function atualizarFiltrosPesquisaveis() {
    if (!window.SearchableSelect) return;

    SearchableSelect.enhance(selectCurso, { placeholder: "Pesquise o curso" });
    SearchableSelect.enhance(selectMateria, { placeholder: "Pesquise a materia" });
    SearchableSelect.enhance(selectTurma, { placeholder: "Pesquise a turma" });
    SearchableSelect.enhance(selectAluno, { placeholder: "Pesquise o aluno" });
  }

  function normalizarTexto(valor) {
    return String(valor || "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase()
      .trim();
  }

  function fecharFiltrosAluno(exceto) {
    [wrapOrdenacaoFreq, wrapMateriaAlunoFreq].forEach((wrap) => {
      if (wrap && wrap !== exceto) wrap.classList.remove("open");
    });
  }

  function alternarFiltroAluno(wrap) {
    if (!wrap) return;
    const vaiAbrir = !wrap.classList.contains("open");
    fecharFiltrosAluno(wrap);
    wrap.classList.toggle("open", vaiAbrir);

    if (vaiAbrir && wrap === wrapMateriaAlunoFreq && inputBuscaMateriaAlunoFreq) {
      inputBuscaMateriaAlunoFreq.focus();
      inputBuscaMateriaAlunoFreq.select();
    }
  }

  function atualizarLabelOrdenacaoAluno() {
    const option = selectOrdenacaoFreq.options[selectOrdenacaoFreq.selectedIndex];
    if (lblOrdenacaoFreq && option) lblOrdenacaoFreq.textContent = option.textContent;

    document.querySelectorAll("#dropOrdenacaoFreq .filtro-custom-option").forEach((btn) => {
      btn.classList.toggle("selected", btn.dataset.value === selectOrdenacaoFreq.value);
    });
  }

  function atualizarLabelMateriaAluno() {
    const option = selectMateriaAluno.options[selectMateriaAluno.selectedIndex];
    if (lblMateriaAlunoFreq && option) lblMateriaAlunoFreq.textContent = option.textContent;

    document.querySelectorAll("#opcoesMateriaAlunoFreq .filtro-custom-option").forEach((btn) => {
      btn.classList.toggle("selected", btn.dataset.value === selectMateriaAluno.value);
    });
  }

  function criarOpcaoMateriaAluno(valor, texto) {
    const botao = document.createElement("button");
    botao.type = "button";
    botao.className = "filtro-custom-option";
    botao.dataset.value = valor;
    botao.textContent = texto;
    botao.addEventListener("click", () => {
      selectMateriaAluno.value = valor;
      atualizarLabelMateriaAluno();
      fecharFiltrosAluno();
      atualizarFrequenciaAluno();
    });
    return botao;
  }

  function renderizarFiltroMateriasAluno() {
    if (!opcoesMateriaAlunoFreq) return;

    const termo = normalizarTexto(inputBuscaMateriaAlunoFreq?.value || "");
    const fragment = document.createDocumentFragment();

    if (normalizarTexto("Todas as materias").includes(termo)) {
      fragment.appendChild(criarOpcaoMateriaAluno("", "Todas as materias"));
    }

    materiasAlunoFiltro
      .filter((materia) => normalizarTexto(materia.materia).includes(termo))
      .forEach((materia) => {
        fragment.appendChild(criarOpcaoMateriaAluno(getMateriaAlunoKey(materia), materia.materia));
      });

    if (!fragment.childNodes.length) {
      const vazio = document.createElement("div");
      vazio.className = "filtro-custom-empty";
      vazio.textContent = "Nenhuma materia encontrada";
      fragment.appendChild(vazio);
    }

    opcoesMateriaAlunoFreq.replaceChildren(fragment);
    atualizarLabelMateriaAluno();
  }

  function getMensagemVazia() {
    return filtroCursoAtivo
      ? t("Selecione curso, materia, turma e aluno para visualizar a frequencia.")
      : t("Selecione materia, turma e aluno para visualizar a frequencia.");
  }

  function mostrarVazio() {
    freqResultArea.innerHTML = `
      <div class="freq-empty">
        <i class="ph ph-magnifying-glass" style="font-size:3.5rem; opacity:0.3;"></i>
        <p>${getMensagemVazia()}</p>
      </div>`;
  }

  function renderizarResultado(dados, alunoId, materiaId, turmaId) {
    const percentual = dados.presenca_raw;
    const statusClass = percentual >= 75 ? "freq-alert-ok" : "freq-alert-danger";
    const statusIcon = percentual >= 75 ? "ph-check-circle" : "ph-warning";
    const statusMsg = percentual >= 75
      ? t("Frequencia regular - acima do minimo exigido (75%)")
      : t("Frequencia insuficiente - abaixo do minimo exigido (75%)");

    freqResultArea.innerHTML = `
      <div class="freq-alert ${statusClass}">
        <i class="ph ${statusIcon}" style="font-size:1.2rem;"></i>
        ${statusMsg}
      </div>
      <div class="freq-card">
        <div class="freq-info">
          <h3 class="freq-nome">${dados.nome}</h3>
          <p class="freq-sub">${dados.materia} &mdash; ${dados.turma}</p>
          <div class="freq-stats">
            <div class="freq-stat-row"><span>${t("Total de Aulas")}</span><strong>${dados.total}</strong></div>
            <div class="freq-stat-row"><span>${t("Presencas")}</span><strong class="freq-val-green">${dados.presencas}</strong></div>
            <div class="freq-stat-row"><span>${t("Faltas")}</span><strong class="freq-val-red">${dados.faltas}</strong></div>
            <div class="freq-stat-row freq-stat-highlight"><span>${t("Frequencia")}</span><strong>${dados.presenca}</strong></div>
          </div>
        </div>
        <div class="freq-chart-col">
          <div class="freq-donut" style="--pct: ${percentual}">
            <div class="freq-donut-inner">
              <span class="freq-donut-pct">${dados.presenca}</span>
              <span class="freq-donut-label">${t("Frequencia")}</span>
            </div>
          </div>
          <div class="freq-legend">
            <div class="freq-legend-item"><span class="freq-dot freq-dot-green"></span> ${t("Presencas")}</div>
            <div class="freq-legend-item"><span class="freq-dot freq-dot-orange"></span> ${t("Faltas")}</div>
          </div>
          <a class="btn-publicar" href="/frequencia/relatorio?aluno=${alunoId}&materia=${materiaId}&turma=${turmaId}">
            <i class="ph ph-download-simple"></i> ${t("Baixar relatorio")}
          </a>
        </div>
      </div>`;
  }

  function getMateriaAlunoKey(materia) {
    return `${materia.materia_id || ""}:${materia.turma_id || ""}`;
  }

  function compararMateriaAluno(a, b) {
    return String(a.materia || "").localeCompare(String(b.materia || ""), window.MonitoraI18n?.getLocale?.() || "pt-BR", { sensitivity: "base" });
  }

  function ordenarMateriasAluno(materias) {
    const ordenacao = selectOrdenacaoFreq?.value || "alfabetica";
    const lista = [...materias];

    if (ordenacao === "freq-asc") {
      return lista.sort((a, b) =>
        Number(a.presenca_raw || 0) - Number(b.presenca_raw || 0) || compararMateriaAluno(a, b)
      );
    }

    if (ordenacao === "freq-desc") {
      return lista.sort((a, b) =>
        Number(b.presenca_raw || 0) - Number(a.presenca_raw || 0) || compararMateriaAluno(a, b)
      );
    }

    return lista.sort(compararMateriaAluno);
  }

  function configurarFiltrosAluno(dados) {
    const materias = [...(dados.materias || [])].sort(compararMateriaAluno);
    materiasAlunoFiltro = materias;
    selectMateriaAluno.innerHTML = `<option value="">Todas as materias</option>`;

    materias.forEach((materia) => {
      const option = document.createElement("option");
      option.value = getMateriaAlunoKey(materia);
      option.textContent = materia.materia;
      selectMateriaAluno.appendChild(option);
    });

    selectMateriaAluno.disabled = materias.length === 0;
    selectOrdenacaoFreq.disabled = materias.length === 0;
    selectOrdenacaoFreq.value = "alfabetica";
    selectMateriaAluno.value = "";
    if (inputBuscaMateriaAlunoFreq) inputBuscaMateriaAlunoFreq.value = "";
    atualizarLabelOrdenacaoAluno();
    renderizarFiltroMateriasAluno();
  }

  function getMateriasAlunoFiltradas() {
    if (!frequenciaAlunoDados) return [];

    const materiaSelecionada = selectMateriaAluno?.value || "";
    const materias = (frequenciaAlunoDados.materias || []).filter((materia) =>
      !materiaSelecionada || getMateriaAlunoKey(materia) === materiaSelecionada
    );

    return ordenarMateriasAluno(materias);
  }

  function renderizarListaPropriaFrequencia(materias) {
    if (!materias || materias.length === 0) {
      freqResultArea.innerHTML = `
        <div class="freq-empty">
          <i class="ph ph-books" style="font-size:3.5rem; opacity:0.3;"></i>
          <p>${t("Nenhuma materia encontrada para esse filtro.")}</p>
        </div>`;
      return;
    }

    let html = "";
    materias.forEach((materia) => {
      const percentual = materia.presenca_raw;
      const statusClass = percentual >= 75 ? "freq-alert-ok" : "freq-alert-danger";
      const statusIcon = percentual >= 75 ? "ph-check-circle" : "ph-warning";
      const statusMsg = percentual >= 75
        ? t("Frequencia regular - acima do minimo exigido (75%)")
        : t("Frequencia insuficiente - abaixo do minimo exigido (75%)");

      html += `
        <div class="freq-alert ${statusClass}" style="margin-bottom:0;">
          <i class="ph ${statusIcon}" style="font-size:1.2rem;"></i>
          <strong style="margin-right:6px;">${materia.materia}:</strong> ${statusMsg}
        </div>
        <div class="freq-card" style="margin-bottom:28px;">
          <div class="freq-info">
            <h3 class="freq-nome">${materia.materia}</h3>
            <p class="freq-sub">${materia.turma}</p>
            <div class="freq-stats">
              <div class="freq-stat-row"><span>${t("Total de Aulas")}</span><strong>${materia.total}</strong></div>
              <div class="freq-stat-row"><span>${t("Presencas")}</span><strong class="freq-val-green">${materia.presencas}</strong></div>
              <div class="freq-stat-row"><span>${t("Faltas")}</span><strong class="freq-val-red">${materia.faltas}</strong></div>
              <div class="freq-stat-row freq-stat-highlight"><span>${t("Frequencia")}</span><strong>${materia.presenca}</strong></div>
            </div>
          </div>
          <div class="freq-chart-col">
            <div class="freq-donut" style="--pct: ${percentual}">
              <div class="freq-donut-inner">
                <span class="freq-donut-pct">${materia.presenca}</span>
                <span class="freq-donut-label">${t("Frequencia")}</span>
              </div>
            </div>
            <div class="freq-legend">
              <div class="freq-legend-item"><span class="freq-dot freq-dot-green"></span> ${t("Presencas")}</div>
              <div class="freq-legend-item"><span class="freq-dot freq-dot-orange"></span> ${t("Faltas")}</div>
            </div>
            <a class="btn-publicar" href="/frequencia/relatorio?aluno=${frequenciaAlunoDados.aluno_id}&materia=${materia.materia_id}&turma=${materia.turma_id}">
              <i class="ph ph-download-simple"></i> ${t("Baixar relatorio")}
            </a>
          </div>
        </div>`;
    });

    freqResultArea.innerHTML = html;
  }

  function atualizarFrequenciaAluno() {
    renderizarListaPropriaFrequencia(getMateriasAlunoFiltradas());
  }

  async function carregarPropriaFrequencia(alunoId) {
    freqResultArea.innerHTML = `
      <div class="freq-empty">
        <i class="ph ph-spinner" style="font-size:2.5rem; opacity:0.4;"></i>
        <p>${t("Carregando sua frequencia...")}</p>
      </div>`;

    try {
      const resposta = await fetch(`/api/frequencia/dados-proprios?aluno_id=${alunoId}`);
      if (!resposta.ok) throw new Error("Erro na requisicao");
      const dados = await resposta.json();
      dados.aluno_id = alunoId;
      frequenciaAlunoDados = dados;
      configurarFiltrosAluno(dados);
      atualizarFrequenciaAluno();
    } catch {
      freqResultArea.innerHTML = `
        <div class="freq-empty">
          <i class="ph ph-warning" style="font-size:2.5rem; opacity:0.4;"></i>
          <p>${t("Nao foi possivel carregar sua frequencia. Tente novamente.")}</p>
        </div>`;
    }
  }

  async function carregarCursos() {
    selectCurso.innerHTML = `<option value="">Selecione o curso</option>`;
    selectCurso.disabled = true;
    selectMateria.innerHTML = `<option value="">Selecione a materia</option>`;
    selectMateria.disabled = true;
    selectTurma.innerHTML = `<option value="">Selecione a turma</option>`;
    selectTurma.disabled = true;
    selectAluno.innerHTML = `<option value="">Selecione o aluno</option>`;
    selectAluno.disabled = true;
    atualizarFiltrosPesquisaveis();
    mostrarVazio();

    try {
      const resposta = await fetch("/api/turmas/cursos", { headers: getAuthHeaders() });
      const dados = await resposta.json();
      const cursos = dados.cursos || [];

      cursos.forEach((curso) => {
        selectCurso.innerHTML += `<option value="${curso.id}">${curso.nome}</option>`;
      });

      selectCurso.disabled = false;
      atualizarFiltrosPesquisaveis();
    } catch {
      console.error("Erro ao carregar cursos");
    }
  }

  async function carregarMaterias() {
    const params = new URLSearchParams();

    selectMateria.innerHTML = `<option value="">Selecione a materia</option>`;
    selectMateria.disabled = filtroCursoAtivo;
    selectTurma.innerHTML = `<option value="">Selecione a turma</option>`;
    selectTurma.disabled = true;
    selectAluno.innerHTML = `<option value="">Selecione o aluno</option>`;
    selectAluno.disabled = true;
    atualizarFiltrosPesquisaveis();
    mostrarVazio();

    if (filtroCursoAtivo) {
      const cursoId = selectCurso.value;
      if (!cursoId) return;
      params.set("curso_id", cursoId);
    }

    try {
      const query = params.toString();
      const resposta = await fetch(`/api/frequencia/materias${query ? `?${query}` : ""}`, {
        headers: getAuthHeaders()
      });
      const materias = await resposta.json();

      materias.forEach((materia) => {
        selectMateria.innerHTML += `<option value="${materia.id}">${materia.nome}</option>`;
      });

      selectMateria.disabled = false;
      atualizarFiltrosPesquisaveis();
    } catch {
      console.error("Erro ao carregar materias");
    }
  }

  async function carregarTurmas() {
    const materiaId = selectMateria.value;
    const params = new URLSearchParams({ materia_id: materiaId });

    if (filtroCursoAtivo && selectCurso.value) {
      params.set("curso_id", selectCurso.value);
    }

    selectTurma.innerHTML = `<option value="">Selecione a turma</option>`;
    selectTurma.disabled = true;
    selectAluno.innerHTML = `<option value="">Selecione o aluno</option>`;
    selectAluno.disabled = true;
    atualizarFiltrosPesquisaveis();
    mostrarVazio();

    if (!materiaId) return;

    try {
      const resposta = await fetch(`/api/frequencia/turmas?${params.toString()}`, {
        headers: getAuthHeaders()
      });
      const turmas = await resposta.json();

      turmas.forEach((turma) => {
        selectTurma.innerHTML += `<option value="${turma.id}">${turma.nome} - ${turma.periodo}o Periodo</option>`;
      });

      selectTurma.disabled = false;
      atualizarFiltrosPesquisaveis();
    } catch {
      console.error("Erro ao carregar turmas");
    }
  }

  async function carregarAlunos() {
    const turmaId = selectTurma.value;
    selectAluno.innerHTML = `<option value="">Selecione o aluno</option>`;
    selectAluno.disabled = true;
    atualizarFiltrosPesquisaveis();
    mostrarVazio();

    if (!turmaId) return;

    try {
      const resposta = await fetch(`/api/frequencia/alunos?turma_id=${turmaId}`, {
        headers: getAuthHeaders()
      });
      const alunos = await resposta.json();

      alunos.forEach((aluno) => {
        selectAluno.innerHTML += `<option value="${aluno.id}">${aluno.nome}</option>`;
      });

      selectAluno.disabled = false;
      atualizarFiltrosPesquisaveis();
    } catch {
      console.error("Erro ao carregar alunos");
    }
  }

  async function carregarFrequencia() {
    const materiaId = selectMateria.value;
    const turmaId = selectTurma.value;
    const alunoId = selectAluno.value;

    if (!materiaId || !turmaId || !alunoId) {
      mostrarVazio();
      return;
    }

    try {
      const resposta = await fetch(`/api/frequencia/dados?aluno_id=${alunoId}&materia_id=${materiaId}&turma_id=${turmaId}`, {
        headers: getAuthHeaders()
      });
      const dados = await resposta.json();
      renderizarResultado(dados, alunoId, materiaId, turmaId);
    } catch {
      console.error("Erro ao carregar frequencia");
    }
  }

  function limparFiltros() {
    if (filtroCursoAtivo) {
      selectCurso.value = "";
      selectMateria.innerHTML = `<option value="">Selecione a materia</option>`;
      selectMateria.disabled = true;
    } else {
      selectMateria.value = "";
      selectMateria.disabled = false;
    }

    selectTurma.innerHTML = `<option value="">Selecione a turma</option>`;
    selectTurma.disabled = true;
    selectAluno.innerHTML = `<option value="">Selecione o aluno</option>`;
    selectAluno.disabled = true;
    atualizarFiltrosPesquisaveis();
    mostrarVazio();
  }

  async function sair() {
    const confirmacao = await Swal.fire({
      icon: "question",
      title: t("Deseja sair?"),
      text: t("Sua sessao sera encerrada."),
      showCancelButton: true,
      confirmButtonText: t("Sim, sair"),
      cancelButtonText: t("Cancelar")
    });

    if (!confirmacao.isConfirmed) return;

    limparSessao();
    window.location.href = "/";
  }

  async function carregarUsuarioLogado() {
    if (!verificarToken()) return;

    try {
      const resposta = await fetch("/api/usuario-logado", { headers: getAuthHeaders() });
      if (!resposta.ok) {
        limparSessao();
        window.location.href = "/";
        return;
      }

      const { usuario } = await resposta.json();

      const heading = document.getElementById("pageHeadingTitle");
      const desc = document.getElementById("pageHeadingDesc");

      if (isAluno(usuario)) {
        filtrosAdmin.classList.add("filtro-oculto");
        filtrosAlunoFreq.classList.remove("filtro-oculto");
        if (heading) heading.textContent = t("Minha Frequencia");
        if (desc) desc.textContent = t("Filtre suas materias e acompanhe da menor para a maior frequencia");
        carregarPropriaFrequencia(usuario.id);
        return;
      }

      filtrosAlunoFreq.classList.add("filtro-oculto");
      filtrosAdmin.classList.remove("filtro-oculto");
      filtroCursoAtivo = !isAluno(usuario);

      if (filtroCursoAtivo) {
        grupoCurso.style.display = "";
        filtrosAdmin.classList.add("notas-filtros--curso");
        if (desc) desc.textContent = t("Selecione curso, materia, turma e aluno para visualizar a frequencia");
        atualizarFiltrosPesquisaveis();
        await carregarCursos();
      } else {
        grupoCurso.style.display = "none";
        filtrosAdmin.classList.remove("notas-filtros--curso");
        if (desc) desc.textContent = t("Selecione a materia, turma e aluno para visualizar a frequencia");
        atualizarFiltrosPesquisaveis();
        await carregarMaterias();
      }
    } catch {
      limparSessao();
      window.location.href = "/";
    }
  }

  if (selectCurso) selectCurso.addEventListener("change", carregarMaterias);
  selectOrdenacaoFreq.addEventListener("change", atualizarFrequenciaAluno);
  selectMateriaAluno.addEventListener("change", atualizarFrequenciaAluno);
  btnOrdenacaoFreq.addEventListener("click", () => alternarFiltroAluno(wrapOrdenacaoFreq));
  btnMateriaAlunoFreq.addEventListener("click", () => alternarFiltroAluno(wrapMateriaAlunoFreq));
  inputBuscaMateriaAlunoFreq.addEventListener("input", renderizarFiltroMateriasAluno);
  document.querySelectorAll("#dropOrdenacaoFreq .filtro-custom-option").forEach((botao) => {
    botao.addEventListener("click", () => {
      selectOrdenacaoFreq.value = botao.dataset.value || "alfabetica";
      atualizarLabelOrdenacaoAluno();
      fecharFiltrosAluno();
      atualizarFrequenciaAluno();
    });
  });
  document.addEventListener("click", (event) => {
    if (event.target.closest("#wrapOrdenacaoFreq") || event.target.closest("#wrapMateriaAlunoFreq")) return;
    fecharFiltrosAluno();
  });
  selectMateria.addEventListener("change", carregarTurmas);
  selectTurma.addEventListener("change", carregarAlunos);
  selectAluno.addEventListener("change", carregarFrequencia);
  btnLimpar.addEventListener("click", limparFiltros);

  atualizarFiltrosPesquisaveis();
  mostrarVazio();
  carregarUsuarioLogado();
</script>

<script src="/static/js/darkmode.js"></script>

</body>
</html>
