<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitora+ | Login</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <main class="page-shell">
    <section class="auth-layout">
      <section class="login-card" aria-labelledby="titulo-login">
        <header class="brand">
          <img src="/static/images/logomonitora.png" alt="Logo Monitora+" class="brand__logo">
          <div>
            <h1 id="titulo-login" class="brand__title">Monitora<span>+</span></h1>
          </div>
        </header>

        <form class="login-form">
          <label class="field-group">
            <span class="field-group__label">E-mail</span>
            <span class="field">
              <span class="field__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M4 6.5h16v11H4v-11Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                  <path d="M4.75 7.25 12 13l7.25-5.75" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>

              <input
                type="email"
                name="email"
                placeholder="Digite seu e-mail"
                autocomplete="username"
                required
              >
            </span>
          </label>

          <label class="field-group">
            <span class="field-group__label">Senha</span>
            <span class="field">
              <span class="field__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M7.25 10V8.5a4.75 4.75 0 1 1 9.5 0V10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  <rect x="5.5" y="10" width="13" height="10" rx="2.5" stroke="currentColor" stroke-width="1.8"/>
                  <circle cx="12" cy="15" r="1.25" fill="currentColor"/>
                </svg>
              </span>

              <input
                id="password"
                type="password"
                name="senha"
                placeholder="Digite sua senha"
                autocomplete="current-password"
                required
              >

              <button class="field__toggle" type="button" data-toggle-password aria-label="Mostrar senha" aria-pressed="false">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M2.75 12s3.25-5.75 9.25-5.75S21.25 12 21.25 12 18 17.75 12 17.75 2.75 12 2.75 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                  <circle cx="12" cy="12" r="2.75" stroke="currentColor" stroke-width="1.8"/>
                </svg>
              </button>
            </span>
          </label>

          <button class="login-button" type="submit">Entrar</button>
          <a class="forgot-link" href="#">Esqueceu a sua senha?</a>
        </form>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    const form = document.querySelector(".login-form");
    const passwordInput = document.querySelector("#password");
    const togglePasswordButton = document.querySelector("[data-toggle-password]");

    if (togglePasswordButton && passwordInput) {
      togglePasswordButton.addEventListener("click", () => {
        const estaOculta = passwordInput.type === "password";

        passwordInput.type = estaOculta ? "text" : "password";
        togglePasswordButton.setAttribute("aria-pressed", String(estaOculta));
        togglePasswordButton.setAttribute(
          "aria-label",
          estaOculta ? "Ocultar senha" : "Mostrar senha"
        );
      });
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const email = form.email.value.trim();
      const senha = form.senha.value.trim();

      if (!email || !senha) {
        Swal.fire({
          icon: "warning",
          title: "Campos obrigatórios",
          text: "Informe seu e-mail e sua senha."
        });

        return;
      }

      try {
        const resposta = await fetch("/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email: email,
            senha: senha
          })
        });

        const dados = await resposta.json();

        if (!resposta.ok) {
          Swal.fire({
            icon: "error",
            title: "Erro no login",
            text: dados.message || "E-mail ou senha inválidos."
          });

          return;
        }

        localStorage.setItem("token", dados.token);
        localStorage.setItem("usuario", JSON.stringify(dados.usuario));
        localStorage.setItem("sessaoExpiracao", String(dados.sessao.expiracao));

        Swal.fire({
          icon: "success",
          title: "Login realizado!",
          text: `Bem-vindo(a), ${dados.usuario.nome}!`,
          timer: 1500,
          showConfirmButton: false
        });

        setTimeout(() => {
          window.location.href = "/inicio";
        }, 1500);

      } catch (erro) {
        console.error("Erro:", erro);

        Swal.fire({
          icon: "error",
          title: "Erro inesperado",
          text: "Não foi possível conectar ao servidor."
        });
      }
    });
  </script>
</body>
</html>
