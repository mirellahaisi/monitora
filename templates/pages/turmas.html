<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitora+ | Turmas</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    :root {
      --accent:     #4caebe;
      --teal:       #57dbbd;
      --teal-light: #93d7df;
      --dark:       #173c4a;
      --mid:        #34445c;
      --text:       #436077;
      --muted:      #7a96a8;
      --bg:         #f5fafa;
      --white:      #ffffff;
      --grad:       linear-gradient(135deg, #93d7df 0%, #57dbbd 55%, #4caebe 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "DM Sans", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ══════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════ */
    .inicio-body { display: flex; min-height: 100vh; background: var(--bg); }

    /* ══════════════════════════════════════
       SIDEBAR (idêntico ao notas.html)
    ══════════════════════════════════════ */
    .sidebar {
      width: 200px; height: calc(100vh - 24px);
      position: sticky; top: 12px;
      margin: 12px 0 12px 12px;
      padding: 24px 14px;
      border-radius: 20px; background: var(--grad);
      display: flex; flex-direction: column; align-items: center;
      flex-shrink: 0; box-shadow: 0 8px 32px rgba(87,219,189,0.25);
      overflow-y: auto;
    }
    .sidebar-brand { text-align: center; margin-bottom: 28px; }
    .sidebar-logo { width: 72px; height: 72px; object-fit: contain; }
    .sidebar-brand h1 {
      margin: 6px 0 0; font-family: "Sora", sans-serif;
      font-size: 1.25rem; font-weight: 700; color: var(--dark); letter-spacing: -0.02em;
    }
    .sidebar-brand h1 span { color: rgba(23,60,74,0.55); }
    .sidebar-menu { width: 100%; display: flex; flex-direction: column; gap: 4px; }
    .sidebar-link {
      width: 100%; padding: 10px 14px; border-radius: 10px;
      color: rgba(255,255,255,0.85); font-size: 0.86rem; font-weight: 500;
      text-decoration: none; transition: background 0.18s, color 0.18s;
      display: flex; align-items: center; gap: 8px;
    }
    .sidebar-link svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-link.active, .sidebar-link:hover {
      background: rgba(255,255,255,0.92); color: var(--mid);
    }
    .sidebar-bottom { margin-top: auto; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .sidebar-laptop svg { width: 80px; opacity: 0.6; }
    .logout-button {
      width: 100%; padding: 10px 14px; border: 0;
      background: transparent; color: rgba(255,255,255,0.7);
      font: inherit; font-size: 0.86rem; text-align: left;
      cursor: pointer; border-radius: 10px;
      display: flex; align-items: center; gap: 8px;
      transition: background 0.18s, color 0.18s;
    }
    .logout-button svg { width: 16px; height: 16px; }
    .logout-button:hover { background: rgba(255,255,255,0.15); color: white; }

    /* ══════════════════════════════════════
       MAIN
    ══════════════════════════════════════ */
    .inicio-main { flex: 1; padding: 28px 36px; min-width: 0; }

    /* ── Header ── */
    .inicio-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 40px;
    }
    .search-box input {
      width: 260px; height: 38px;
      border: 1.5px solid rgba(147,215,223,0.35); border-radius: 50px;
      padding: 0 18px; background: var(--white); outline: none;
      font: inherit; font-size: 0.88rem; color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(76,190,190,0.1); }
    .search-box input::placeholder { color: #a8bfcc; }

    .user-menu { position: relative; display: flex; align-items: center; }
    .user-menu-button {
      border: none; background: var(--white); cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      padding: 7px 14px 7px 7px; border-radius: 999px;
      box-shadow: 0 2px 12px rgba(76,190,190,0.15); color: var(--mid);
      transition: box-shadow 0.2s;
    }
    .user-menu-button:hover { box-shadow: 0 4px 18px rgba(76,190,190,0.22); }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--grad); color: white;
      display: flex; align-items: center; justify-content: center;
      font-family: "Sora", sans-serif; font-weight: 700; font-size: 0.9rem;
    }
    .user-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.15; }
    .user-text span { font-size: 0.72rem; font-weight: 600; color: var(--accent); }
    .user-text strong { font-size: 0.88rem; font-weight: 700; color: var(--mid); }
    .user-arrow { font-size: 12px; color: var(--muted); }
    .user-dropdown {
      display: none; position: absolute; top: 48px; right: 0;
      min-width: 180px; background: var(--white); border-radius: 14px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.12); padding: 8px; z-index: 100;
    }
    .user-dropdown.show { display: block; }
    .user-dropdown button {
      width: 100%; border: none; background: transparent;
      padding: 10px 12px; text-align: left; border-radius: 8px;
      cursor: pointer; font: inherit; font-size: 0.88rem; color: var(--text);
    }
    .user-dropdown button:hover { background: var(--bg); color: var(--accent); }

    /* ══════════════════════════════════════
       PAGE HEADING
    ══════════════════════════════════════ */
    .page-heading {
      display: flex; align-items: center;
      gap: 14px; margin-bottom: 28px;
    }
    .page-heading-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--grad); display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(87,219,189,0.3); flex-shrink: 0;
    }
    .page-heading-icon svg { width: 22px; height: 22px; color: white; }
    .page-heading h2 {
      font-family: "Sora", sans-serif; font-size: 1.5rem;
      font-weight: 800; color: var(--dark); letter-spacing: -0.025em;
    }
    .page-heading p { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }

    /* ══════════════════════════════════════
       BARRA DE AÇÕES (filtro + botão criar)
    ══════════════════════════════════════ */
    .turmas-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .turmas-filtros { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    /* Custom filter dropdowns */
    .filtro-custom {
      position: relative; display: inline-block;
    }
    .filtro-custom-btn {
      height: 40px; padding: 0 38px 0 14px;
      border: 1.5px solid rgba(147,215,223,0.4); border-radius: 10px;
      background: var(--white); color: var(--mid);
      font: inherit; font-size: 0.88rem; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
      white-space: nowrap; min-width: 160px; position: relative;
    }
    .filtro-custom-btn::after {
      content: '';
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      border: 5px solid transparent;
      border-top-color: var(--muted);
      margin-top: 3px;
      transition: transform 0.2s;
    }
    .filtro-custom.open .filtro-custom-btn::after {
      transform: translateY(-50%) rotate(180deg); margin-top: -3px;
    }
    .filtro-custom-btn:hover, .filtro-custom.open .filtro-custom-btn {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(76,190,190,0.1);
    }
    .filtro-custom-dropdown {
      display: none; position: absolute; top: calc(100% + 6px); left: 0;
      min-width: 100%; background: var(--white); border-radius: 12px;
      box-shadow: 0 8px 28px rgba(23,60,74,0.14); z-index: 50;
      padding: 6px; border: 1.5px solid rgba(147,215,223,0.2);
      animation: dropIn 0.14s ease;
    }
    @keyframes dropIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }
    .filtro-custom.open .filtro-custom-dropdown { display: block; }
    .filtro-custom-option {
      padding: 9px 12px; border-radius: 8px; cursor: pointer;
      font-size: 0.86rem; color: var(--text); transition: background 0.14s;
    }
    .filtro-custom-option:hover { background: rgba(147,215,223,0.12); color: var(--mid); }
    .filtro-custom-option.selected { background: rgba(76,190,190,0.1); color: var(--accent); font-weight: 600; }

    .btn-nova-turma {
      height: 40px; padding: 0 20px;
      background: var(--grad); color: white; border: none;
      border-radius: 10px; font: inherit; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 14px rgba(87,219,189,0.3);
      transition: opacity 0.2s, transform 0.15s; white-space: nowrap;
    }
    .btn-nova-turma:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-nova-turma svg { width: 16px; height: 16px; }

    /* ══════════════════════════════════════
       GRID DE CARDS DE TURMA
    ══════════════════════════════════════ */
    .turmas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }

    .turma-card {
      background: var(--white);
      border: 1.5px solid rgba(147,215,223,0.25);
      border-radius: 16px;
      padding: 22px 22px 18px;
      box-shadow: 0 4px 20px rgba(76,190,190,0.08);
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.18s, border-color 0.2s;
      display: flex; flex-direction: column; gap: 14px;
    }
    .turma-card:hover {
      box-shadow: 0 8px 32px rgba(76,190,190,0.18);
      transform: translateY(-3px);
      border-color: rgba(76,190,190,0.35);
    }

    .turma-card-header {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
      min-height: 64px;
    }
    .turma-card-titulo {
      font-family: "Sora", sans-serif;
      font-size: 1rem; font-weight: 700; color: var(--dark); line-height: 1.3;
    }
    .turma-card-codigo {
      font-size: 0.75rem; color: var(--muted); margin-top: 2px;
    }

    .badge-periodo {
      flex-shrink: 0;
      padding: 4px 10px; border-radius: 6px;
      font-size: 0.72rem; font-weight: 700;
      background: rgba(147,215,223,0.2); color: var(--accent);
      border: 1px solid rgba(76,190,190,0.2); letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .turma-card-stats {
      display: flex; gap: 12px;
    }
    .stat-item {
      flex: 1; background: var(--bg); border-radius: 10px;
      padding: 10px 12px; display: flex; flex-direction: column; gap: 2px;
    }
    .stat-valor {
      font-family: "Sora", sans-serif;
      font-size: 1.3rem; font-weight: 800; color: var(--dark);
    }
    .stat-label {
      font-size: 0.72rem; color: var(--muted); font-weight: 500;
    }

    .turma-card-materias {
      font-size: 0.8rem; color: var(--muted);
      border-top: 1px solid rgba(147,215,223,0.2);
      padding-top: 12px; line-height: 1.5;
      flex: 1;
    }
    .turma-card-materias strong {
      font-size: 0.72rem; font-weight: 700; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 3px;
    }

    .turma-card-footer {
      display: flex; align-items: center; justify-content: space-between;
    }
    .turma-turno {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.78rem; color: var(--muted);
    }
    .turma-turno svg { width: 13px; height: 13px; }

    .btn-ver-turma {
      height: 32px; padding: 0 14px; border: 1.5px solid rgba(76,190,190,0.35);
      border-radius: 8px; background: transparent; color: var(--accent);
      font: inherit; font-size: 0.8rem; font-weight: 700; cursor: pointer;
      transition: background 0.18s, color 0.18s;
    }
    .btn-ver-turma:hover { background: var(--accent); color: white; }

    .btn-gerir-turma {
      height: 32px; padding: 0 14px; border: none;
      border-radius: 8px; background: var(--grad); color: white;
      font: inherit; font-size: 0.8rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.18s, transform 0.15s;
      box-shadow: 0 2px 8px rgba(87,219,189,0.3);
      display: flex; align-items: center; gap: 5px;
    }
    .btn-gerir-turma:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-gerir-turma svg { width: 13px; height: 13px; }

    /* Modal de Gestão — mais largo para comportar as seções lado a lado */
    .modal-gestao-wide {
      width: 820px; max-width: calc(100vw - 40px);
    }

    /* Seções lado a lado no modal de gestão */
    .gestao-grid-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 680px) {
      .gestao-grid-2col { grid-template-columns: 1fr; }
    }

    .gestao-panel {
      background: var(--bg); border-radius: 14px;
      border: 1.5px solid rgba(147,215,223,0.2);
      display: flex; flex-direction: column; gap: 0; overflow: hidden;
    }
    .gestao-panel-header {
      padding: 14px 18px 12px;
      border-bottom: 1.5px solid rgba(147,215,223,0.18);
      background: var(--white);
      display: flex; align-items: center; gap: 10px;
    }
    .gestao-panel-icon {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--grad); display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .gestao-panel-icon svg { width: 15px; height: 15px; color: white; }
    .gestao-panel-title {
      font-family: "Sora", sans-serif; font-size: 0.84rem;
      font-weight: 800; color: var(--dark); letter-spacing: -0.01em;
    }
    .gestao-panel-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 10px; }

    /* Custom select inside gestão */
    .gestao-custom-select-wrap { position: relative; }
    .gestao-custom-select-btn {
      width: 100%; height: 40px; padding: 0 38px 0 12px;
      border: 1.5px solid rgba(147,215,223,0.4); border-radius: 10px;
      background: var(--white); color: var(--mid);
      font: inherit; font-size: 0.86rem; cursor: pointer;
      display: flex; align-items: center; text-align: left;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: border-color 0.2s, box-shadow 0.2s; position: relative;
    }
    .gestao-custom-select-btn::after {
      content: ''; position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      border: 5px solid transparent; border-top-color: var(--muted); margin-top: 3px;
      transition: transform 0.18s;
    }
    .gestao-custom-select-wrap.open .gestao-custom-select-btn::after {
      transform: translateY(-50%) rotate(180deg); margin-top: -3px;
    }
    .gestao-custom-select-btn:hover,
    .gestao-custom-select-wrap.open .gestao-custom-select-btn {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(76,190,190,0.1);
    }
    .gestao-custom-select-dropdown {
      display: none; position: absolute; top: calc(100% + 5px); left: 0; right: 0;
      background: var(--white); border-radius: 11px;
      box-shadow: 0 8px 28px rgba(23,60,74,0.14); z-index: 60;
      padding: 6px; border: 1.5px solid rgba(147,215,223,0.2);
      max-height: 200px; overflow-y: auto;
      animation: dropIn 0.13s ease;
    }
    .gestao-custom-select-wrap.open .gestao-custom-select-dropdown { display: block; }
    .gestao-custom-select-option {
      padding: 9px 12px; border-radius: 7px; cursor: pointer;
      font-size: 0.84rem; color: var(--text); transition: background 0.13s;
    }
    .gestao-custom-select-option:hover { background: rgba(147,215,223,0.12); color: var(--mid); }
    .gestao-custom-select-option.selected { background: rgba(76,190,190,0.1); color: var(--accent); font-weight: 600; }
    .gestao-custom-select-no-results {
      grid-column: 1/-1;
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 0.95rem;
    }

    /* ══════════════════════════════════════
       MODAL DE DETALHES DA TURMA
    ══════════════════════════════════════ */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(23,60,74,0.45); backdrop-filter: blur(4px);
      z-index: 200; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--white); border-radius: 20px;
      width: 680px; max-width: calc(100vw - 40px);
      max-height: 85vh; display: flex; flex-direction: column;
      box-shadow: 0 24px 60px rgba(23,60,74,0.2); overflow: hidden;
    }

    .modal-header {
      padding: 24px 28px 20px;
      border-bottom: 1.5px solid rgba(147,215,223,0.2);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    }
    .modal-titulo {
      font-family: "Sora", sans-serif;
      font-size: 1.2rem; font-weight: 800; color: var(--dark);
    }
    .modal-subtitulo { font-size: 0.82rem; color: var(--muted); margin-top: 3px; }

    .modal-close {
      width: 34px; height: 34px; border-radius: 8px; border: none;
      background: var(--bg); color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0; transition: background 0.18s;
    }
    .modal-close:hover { background: rgba(147,215,223,0.3); color: var(--dark); }

    .modal-tabs {
      display: flex; padding: 0 28px;
      border-bottom: 1.5px solid rgba(147,215,223,0.2);
      gap: 0;
    }
    .modal-tab {
      padding: 14px 18px; border: none; background: transparent;
      font: inherit; font-size: 0.86rem; font-weight: 600; color: var(--muted);
      cursor: pointer; border-bottom: 2.5px solid transparent; margin-bottom: -1.5px;
      transition: color 0.18s, border-color 0.18s;
    }
    .modal-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .modal-tab:hover:not(.active) { color: var(--mid); }

    .modal-body {
      flex: 1; overflow-y: auto; padding: 24px 28px;
    }

    /* Tabela dentro do modal */
    .modal-table {
      width: 100%; border-collapse: collapse;
    }
    .modal-table th {
      height: 40px; padding: 0 14px;
      color: var(--mid); font-family: "Sora", sans-serif;
      font-size: 0.75rem; font-weight: 700; text-align: left;
      letter-spacing: 0.04em; text-transform: uppercase;
      border-bottom: 1.5px solid rgba(147,215,223,0.25);
    }
    .modal-table td {
      height: 50px; padding: 0 14px;
      color: var(--text); font-size: 0.88rem;
      border-bottom: 1px solid rgba(147,215,223,0.12); vertical-align: middle;
    }
    .modal-table tr:last-child td { border-bottom: none; }
    .modal-table tbody tr:hover { background: rgba(147,215,223,0.06); }
    .modal-vazio {
      text-align: center; padding: 36px; color: var(--muted); font-size: 0.88rem;
    }

    .media-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 60px; height: 28px; border-radius: 7px;
      font-size: 0.82rem; font-weight: 700;
    }
    .media-aprovada { background: rgba(87,219,189,0.15); color: #1a8c6e; border: 1px solid rgba(87,219,189,0.3); }
    .media-baixa    { background: rgba(255,107,107,0.1);  color: #c0392b; border: 1px solid rgba(255,107,107,0.25); }
    .media-neutra   { background: rgba(147,215,223,0.12); color: var(--muted); border: 1px solid rgba(147,215,223,0.25); }

    /* ══════════════════════════════════════
       GESTÃO DA TURMA (aba coordenador)
    ══════════════════════════════════════ */
    .gestao-section { margin-bottom: 28px; }
    .gestao-section:last-child { margin-bottom: 0; }

    .gestao-section-titulo {
      font-family: "Sora", sans-serif;
      font-size: 0.78rem; font-weight: 800; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .gestao-add-row {
      display: flex; gap: 10px; margin-bottom: 14px;
    }
    .gestao-add-row select {
      flex: 1; height: 40px; border: 1.5px solid rgba(147,215,223,0.4);
      border-radius: 10px; background: var(--bg); color: var(--mid);
      font: inherit; font-size: 0.88rem; padding: 0 12px; outline: none;
      transition: border-color 0.2s;
    }
    .gestao-add-row select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(76,190,190,0.1); }
    .gestao-add-row select:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-gestao-add {
      height: 40px; padding: 0 16px; border: none;
      border-radius: 10px; background: var(--grad); color: white;
      font: inherit; font-size: 0.84rem; font-weight: 700; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(87,219,189,0.25);
      transition: opacity 0.2s, transform 0.15s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-gestao-add:hover { opacity: 0.9; transform: translateY(-1px); }

  <script>
    // ── Refs ──────────────────────────────────────────────
    const turmasGrid      = document.getElementById("turmasGrid");
    const filtroPeriodo   = document.getElementById("filtroPeriodo");
    const filtroTurno     = document.getElementById("filtroTurno");
    const btnNovaTurma    = document.getElementById("btnNovaTurma");
    const secaoTurmas     = document.getElementById("secaoTurmas");
    const secaoMinhaTurma = document.getElementById("secaoMinhaTurma");

    const modalDetalhes   = document.getElementById("modalDetalhes");
    const detalhesTitulo  = document.getElementById("detalhesTitulo");
    const detalhesSubtitulo = document.getElementById("detalhesSubtitulo");
    const detalhesBody    = document.getElementById("detalhesBody");
    const fecharDetalhes  = document.getElementById("fecharDetalhes");

    const modalGestao     = document.getElementById("modalGestao");
    const gestaoTitulo    = document.getElementById("gestaoTitulo");
    const gestaoSubtitulo = document.getElementById("gestaoSubtitulo");
    const gestaoBody      = document.getElementById("gestaoBody");
    const fecharGestao    = document.getElementById("fecharGestao");

    const modalNovaTurma  = document.getElementById("modalNovaTurma");
    const fecharNovaTurma = document.getElementById("fecharNovaTurma");
    const cancelarNovaTurma = document.getElementById("cancelarNovaTurma");
    const confirmarNovaTurma = document.getElementById("confirmarNovaTurma");

    const nomeUsuarioTopo  = document.getElementById("nomeUsuarioTopo");
    const papelUsuario     = document.getElementById("papelUsuario");
    const avatarUsuario    = document.getElementById("avatarUsuario");
    const botaoMenuUsuario = document.getElementById("botaoMenuUsuario");
    const menuUsuario      = document.getElementById("menuUsuario");
    const btnEditarPerfil  = document.getElementById("btnEditarPerfil");
    const btnSair          = document.getElementById("btnSair");

    // ── Estado ────────────────────────────────────────────
    let todasTurmas    = [];
    let tabAtiva       = "alunos";
    let turmaDetalheId = null;
    let papelAtual     = "";

    // ── Auth ──────────────────────────────────────────────
    function getToken() { return localStorage.getItem("token"); }

    function limparSessao() {
      ["token","usuario","sessaoExpiracao"].forEach(k => localStorage.removeItem(k));
    }

    function tokenExpirado() {
      const exp = Number(localStorage.getItem("sessaoExpiracao"));
      return !exp || exp < Math.floor(Date.now() / 1000);
    }

    function verificarToken() {
      if (!getToken() || tokenExpirado()) { limparSessao(); window.location.href = "/"; return false; }
      return true;
    }

    function formatarPapel(p) {
      const s = String(p).toLowerCase();
      if (["admin","adm","coordenador"].includes(s)) return "Coordenador";
      if (s === "professor") return "Professor";
      if (s === "aluno") return "Aluno";
      return p;
    }

    function isProfessor(p) {
      if (p === null || p === undefined) return false;
      const s = String(p).toLowerCase();
      return s === "professor" || s === "2" || Number(p) === 2;
    }

    function isAluno(p) {
      if (p === null || p === undefined) return false;
      const s = String(p).toLowerCase();
      return s === "aluno" || s === "1" || Number(p) === 1;
    }

    function ehCoordenador(p) {
      return ["admin","adm","coordenador"].includes(String(p).toLowerCase());
    }

    // ── Carregar usuário ──────────────────────────────────
    async function carregarUsuarioLogado() {
      // Primeiro tenta aplicar UI a partir do que está em localStorage (mais rápido e consistente ao navegar)
      try {
        const usuarioCache = (function(){
          try {
            const t = getToken();
            if (t) {
              const part = t.split('.')[1];
              const b64 = part.replace(/-/g,'+').replace(/_/g,'/');
              const pad = '='.repeat((4 - b64.length % 4) % 4);
              return JSON.stringify(JSON.parse(atob(b64 + pad)));
            }
          } catch(e){}
          return localStorage.getItem("usuario");
        })();
        if (usuarioCache) {
          const usuario = JSON.parse(usuarioCache);
          papelAtual = usuario.papel;
          if (nomeUsuarioTopo) nomeUsuarioTopo.textContent = usuario.nome;
          if (papelUsuario)    papelUsuario.textContent    = formatarPapel(usuario.papel);
          if (avatarUsuario)   avatarUsuario.textContent   = usuario.nome.charAt(0).toUpperCase();

          const btnGestao = document.getElementById("btnGestaoUsuarios");
          if (btnGestao && ehCoordenador(usuario.papel)) btnGestao.style.display = "block";

          const ehAluno = isAluno(usuario.papel);
          const labelLink = document.getElementById("labelLinkTurmas");
          if (labelLink && ehAluno) labelLink.textContent = "Minha Turma";
          const linkPresenca = document.getElementById("linkPresenca");
          if (linkPresenca && !isProfessor(usuario.papel)) linkPresenca.style.display = "none";

          if (ehAluno) {
            document.querySelector(".page-heading h2").textContent = "Minha Turma";
            document.getElementById("subtituloTurmas").textContent = "Sua turma e colegas matriculados";
            secaoTurmas.style.display = "none";
            secaoMinhaTurma.style.display = "block";
            await carregarMinhaTurma(usuario.id);
          } else {
            if (ehCoordenador(usuario.papel)) {
              document.getElementById("subtituloTurmas").textContent = "Visão geral de todas as turmas ativas";
              btnNovaTurma.style.display = "flex";
            } else {
              document.getElementById("subtituloTurmas").textContent = "Turmas em que você leciona";
            }
            await carregarTurmas();
          }
        }
      } catch (e) { console.warn("Erro ao aplicar usuario do cache:", e); }

      // Depois valida/atualiza com a API (autoriza token e obtém dados atuais)
      if (!verificarToken()) { limparSessao(); window.location.href = "/"; return; }
      try {
        const res = await fetch("/api/usuario-logado", { headers: { Authorization: `Bearer ${getToken()}` } });
        if (!res.ok) { limparSessao(); window.location.href = "/"; return; }
        const { usuario } = await res.json();
        // Atualiza cache e UI com dados do servidor
        localStorage.setItem("usuario", JSON.stringify(usuario));
        papelAtual = usuario.papel;
        if (nomeUsuarioTopo) nomeUsuarioTopo.textContent = usuario.nome;
        if (papelUsuario)    papelUsuario.textContent    = formatarPapel(usuario.papel);
        if (avatarUsuario)   avatarUsuario.textContent   = usuario.nome.charAt(0).toUpperCase();
      } catch { limparSessao(); window.location.href = "/"; }
    }

    // ── Carregar minha turma (aluno) ──────────────────────
    async function carregarMinhaTurma(usuarioId) {
      if (!verificarToken()) return;
      const infoDiv    = document.getElementById("minhaTurmaInfo");
      const colegasDiv = document.getElementById("minhaTurmaColegas");
      const listaDiv   = document.getElementById("colegasLista");

      infoDiv.innerHTML = `<div class="turmas-vazio">Carregando sua turma...</div>`;
      try {
        const res   = await fetch("/api/minha-turma", { headers: { Authorization: `Bearer ${getToken()}` } });
        const dados = await res.json();

        if (!res.ok) {
          infoDiv.innerHTML = `<div class="turmas-vazio">${dados.message || "Erro ao carregar sua turma."}</div>`;
          return;
        }

        const t = dados.turma;
        const semLabel = t.semestre ? `${t.semestre}º sem. ${t.ano || ""}` : "";

        infoDiv.innerHTML = `
          <div class="minha-turma-header">
            <div>
              <div class="minha-turma-nome">${t.nome}</div>
              <div class="minha-turma-meta">
                ${t.periodo ? `<span class="turma-meta-item">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                  ${t.periodo}º período
                </span>` : ""}
                ${t.turno ? `<span class="turma-meta-item">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  ${t.turno}
                </span>` : ""}
                ${semLabel ? `<span class="turma-meta-item">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  ${semLabel}
                </span>` : ""}
                ${t.codigo ? `<span class="turma-meta-item">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                  ${t.codigo}
                </span>` : ""}
                <span class="turma-meta-item">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                  ${t.total_alunos} aluno(s)
                </span>
              </div>
            </div>
            <span class="badge-periodo">${t.periodo ? t.periodo + "º per." : "—"}</span>
          </div>
          ${t.materias ? `<div class="minha-turma-materias"><strong>Matérias</strong>${t.materias}</div>` : ""}
        `;

        // Lista de colegas
        const alunos = dados.alunos || [];
        if (alunos.length) {
          colegasDiv.style.display = "block";
          listaDiv.innerHTML = `
            <table class="colegas-tabela">
              <thead><tr>
                <th>#</th>
                <th>Nome</th>
                <th>E-mail</th>
              </tr></thead>
              <tbody>
                ${alunos.map((a, i) => {
                  const euLabel = String(a.id) === String(usuarioId)
                    ? `<span class="colega-eu">você</span>` : "";
                  return `<tr>
                    <td style="color:var(--muted);font-size:0.8rem;width:40px">${i + 1}</td>

    // ── Carregar turmas ───────────────────────────────────
    async function carregarTurmas() {
      if (!verificarToken()) return;
      turmasGrid.innerHTML = `<div class="turmas-vazio">Carregando turmas...</div>`;
      try {
        const res = await fetch("/api/turmas", { headers: { Authorization: `Bearer ${getToken()}` } });
        const dados = await res.json();
        if (!res.ok) { Swal.fire("Erro", dados.message || "Erro ao carregar turmas.", "error"); return; }
        todasTurmas = dados.turmas || [];
        popularFiltroPeriodo();
        popularFiltroTurno();
        renderizarTurmas();
      } catch { Swal.fire("Erro", "Falha na conexão com o servidor.", "error"); }
    }

    function popularFiltroPeriodo() {
      const periodos = [...new Set(todasTurmas.map(t => t.periodo).filter(Boolean))].sort((a,b) => a-b);
      filtroPeriodo.innerHTML = `<option value="">Todos os períodos</option>`;
      periodos.forEach(p => {
        filtroPeriodo.innerHTML += `<option value="${p}">${p}\u00ba per\u00edodo</option>`;
      });
      atualizarDropdownPeriodo && atualizarDropdownPeriodo();
    }

    function popularFiltroTurno() {
      const turnos = [...new Set(
        todasTurmas.map(t => t.turno).filter(Boolean).map(t => t.trim())
      )].sort();
      const atual = filtroTurno.value;
      filtroTurno.innerHTML = `<option value="">Todos os turnos</option>`;
      turnos.forEach(t => {
        filtroTurno.innerHTML += `<option value="${t.toLowerCase()}">${t}</option>`;
      });
      if (atual) filtroTurno.value = atual;
      atualizarDropdownTurno && atualizarDropdownTurno();
    }

    function renderizarTurmas() {
      const periodo = filtroPeriodo.value;
      const turno   = filtroTurno.value;

      const filtradas = todasTurmas.filter(t => {
        if (periodo && String(t.periodo) !== String(periodo)) return false;
        if (turno   && (t.turno || '').trim().toLowerCase() !== turno) return false;
        return true;
      });

      if (filtradas.length === 0) {
        turmasGrid.innerHTML = `<div class="turmas-vazio">Nenhuma turma encontrada com esses filtros.</div>`;
        return;
      }

      turmasGrid.innerHTML = filtradas.map(t => {
        const ocupacao   = t.capacidade ? `${t.total_alunos}/${t.capacidade}` : t.total_alunos;
        const materias   = t.materias   || "—";
        const turno      = t.turno      || "—";
        const codLabel   = t.codigo     ? `Cód. ${t.codigo}` : "";
        const semLabel   = t.semestre   ? ` · ${t.semestre}º sem. ${t.ano || ""}` : "";

        return `
          <div class="turma-card" data-id="${t.id}">
            <div class="turma-card-header">
              <div>
                <div class="turma-card-titulo">${t.nome}</div>
                <div class="turma-card-codigo">${codLabel}${semLabel}</div>
              </div>
              <span class="badge-periodo">${t.periodo ? t.periodo + "º per." : "—"}</span>
            </div>

            <div class="turma-card-stats">
              <div class="stat-item">
                <span class="stat-valor">${t.total_alunos}</span>
                <span class="stat-label">Alunos</span>
              </div>
              <div class="stat-item">
                <span class="stat-valor">${t.capacidade || "—"}</span>
                <span class="stat-label">Capacidade</span>
              </div>
            </div>

            <div class="turma-card-materias">
              <strong>Matérias</strong>
              ${materias}
            </div>

            <div class="turma-card-footer">
              <span class="turma-turno">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
                ${turno}
              </span>
              <div style="display:flex;gap:6px">
                <button class="btn-ver-turma" data-id="${t.id}" data-nome="${t.nome}">Ver detalhes</button>
                ${ehCoordenador(papelAtual) ? `<button class="btn-gerir-turma" data-id="${t.id}" data-nome="${t.nome}">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
                  Gerir
                </button>` : ""}
              </div>
            </div>
          </div>
        `;
      }).join("");

      // eventos nos cards e botões
      document.querySelectorAll(".turma-card").forEach(card => {
        card.addEventListener("click", e => {
          if (e.target.closest(".btn-ver-turma")) return;
          if (e.target.closest(".btn-gerir-turma")) return;
          abrirDetalhes(card.dataset.id, card.querySelector(".turma-card-titulo").textContent);
        });
      });
      document.querySelectorAll(".btn-ver-turma").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          abrirDetalhes(btn.dataset.id, btn.dataset.nome);
        });
      });
      document.querySelectorAll(".btn-gerir-turma").forEach(btn => {
        btn.addEventListener("click", e => {
          e.stopPropagation();
          abrirGestao(btn.dataset.id, btn.dataset.nome);
        });
      });
    }

    // ── Modal Detalhes ────────────────────────────────────
    async function abrirDetalhes(id, nome) {
      turmaDetalheId = id;
      const turma = todasTurmas.find(t => String(t.id) === String(id));
      detalhesTitulo.textContent   = nome;
      detalhesSubtitulo.textContent = turma
        ? `${turma.turno || ""} · ${turma.periodo ? turma.periodo + "º período" : ""} · ${turma.total_alunos} aluno(s)`
        : "";

      // Resetar aba
      tabAtiva = "alunos";
      document.querySelectorAll(".modal-tab").forEach(t => t.classList.remove("active"));
      document.querySelector(".modal-tab[data-tab='alunos']").classList.add("active");

      modalDetalhes.classList.add("show");
      await carregarAba("alunos", id);
    }

    // ── Modal Gestão (coordenador) ────────────────────────
    async function abrirGestao(id, nome) {
      turmaDetalheId = id;
      gestaoTitulo.textContent   = `Gerir: ${nome}`;
      gestaoSubtitulo.textContent = "Alunos matriculados · Matérias e professores";
      modalGestao.classList.add("show");
      await carregarModalGestao(id);
    }

    async function carregarAba(aba, id) {
      detalhesBody.innerHTML = `<div class="turmas-vazio">Carregando...</div>`;

      if (aba === "gestao") {
        await carregarAbaGestao(id);
        return;
      }

      try {
        const endpoint = aba === "alunos"
          ? `/api/turmas/${id}/alunos`
          : `/api/turmas/${id}/materias`;

        const res  = await fetch(endpoint, { headers: { Authorization: `Bearer ${getToken()}` } });
        const dados = await res.json();
        if (!res.ok) { detalhesBody.innerHTML = `<div class="turmas-vazio">${dados.message}</div>`; return; }

        if (aba === "alunos") {
          const alunos = dados.alunos || [];
          if (!alunos.length) { detalhesBody.innerHTML = `<div class="turmas-vazio">Nenhum aluno matriculado.</div>`; return; }

          detalhesBody.innerHTML = `
            <table class="modal-table">
              <thead><tr>
                <th>Aluno(a)</th>
                <th>E-mail</th>
                <th style="text-align:center">Média Geral</th>
              </tr></thead>
              <tbody>
                ${alunos.map(a => {
                  const media = a.media_geral !== null && a.media_geral !== undefined ? a.media_geral : null;
                  const classeMedia = media === null ? "media-neutra" : media >= 6 ? "media-aprovada" : "media-baixa";
                  const mediaLabel  = media !== null ? String(media).replace(".", ",") : "—";
                  return `<tr>
                    <td>${a.nome}</td>
                    <td style="color:var(--muted);font-size:0.82rem">${a.email || "—"}</td>
                    <td style="text-align:center"><span class="media-badge ${classeMedia}">${mediaLabel}</span></td>
                  </tr>`;
                }).join("")}
              </tbody>
            </table>
          `;
        } else {
          const materias = dados.materias || [];
          if (!materias.length) { detalhesBody.innerHTML = `<div class="turmas-vazio">Nenhuma matéria vinculada.</div>`; return; }

          detalhesBody.innerHTML = `
            <table class="modal-table">
              <thead><tr>
                <th>Matéria</th>
                <th>Carga horária</th>
                <th>Professor(es)</th>
              </tr></thead>
              <tbody>
                ${materias.map(m => `<tr>
                  <td>${m.nome}</td>
                  <td>${m.carga_horaria ? m.carga_horaria + "h" : "—"}</td>
                  <td style="color:var(--muted);font-size:0.82rem">${m.professores || "Sem professor"}</td>
                </tr>`).join("")}
              </tbody>
            </table>
          `;
        }
      } catch { detalhesBody.innerHTML = `<div class="turmas-vazio">Erro ao carregar dados.</div>`; }
    }

    // ── Gestão (modal dedicado) ───────────────────────────
    let todosUsuarios = [];
    let todasMaterias = [];

    async function carregarRecursosGestao() {
      if (todosUsuarios.length && todasMaterias.length) return;
      const [resU, resM] = await Promise.all([
        fetch("/api/usuarios/disponiveis", { headers: { Authorization: `Bearer ${getToken()}` } }),
        fetch("/api/materias/todas",       { headers: { Authorization: `Bearer ${getToken()}` } }),
      ]);
      if (resU.ok) { const d = await resU.json(); todosUsuarios = d.usuarios || []; }
      if (resM.ok) { const d = await resM.json(); todasMaterias = d.materias || []; }
    }

    function buildCustomSelect(wrapId, options, placeholder) {
      return `
        <div class="gestao-custom-select-wrap" id="${wrapId}">
          <button class="gestao-custom-select-btn" type="button" data-value="">
            ${placeholder}
          </button>
          <div class="gestao-custom-select-dropdown">
            <div class="gestao-custom-select-option selected" data-value="">${placeholder}</div>
            ${options.map(o => `<div class="gestao-custom-select-option" data-value="${o.value}">${o.label}</div>`).join("")}
          </div>
        </div>`;
    }

    function initCustomSelect(wrapId, onChange) {
      const wrap = document.getElementById(wrapId);
      if (!wrap) return;
      const btn  = wrap.querySelector(".gestao-custom-select-btn");
      const drop = wrap.querySelector(".gestao-custom-select-dropdown");
      btn.addEventListener("click", e => { e.stopPropagation(); wrap.classList.toggle("open"); });
      drop.querySelectorAll(".gestao-custom-select-option").forEach(opt => {
        opt.addEventListener("click", () => {
          btn.dataset.value = opt.dataset.value;
          btn.textContent   = opt.textContent;
          drop.querySelectorAll(".gestao-custom-select-option").forEach(o => o.classList.remove("selected"));
          opt.classList.add("selected");
          wrap.classList.remove("open");
          if (onChange) onChange(opt.dataset.value);
        });
      });
      document.addEventListener("click", () => wrap.classList.remove("open"), { capture: false });
    }

    async function carregarModalGestao(turmaId) {
      gestaoBody.innerHTML = `<div class="turmas-vazio">Carregando...</div>`;
      await carregarRecursosGestao();

      const [resAlunos, resMaterias] = await Promise.all([
        fetch(`/api/turmas/${turmaId}/alunos`,   { headers: { Authorization: `Bearer ${getToken()}` } }),
        fetch(`/api/turmas/${turmaId}/materias`,  { headers: { Authorization: `Bearer ${getToken()}` } }),
      ]);

      const alunosData   = resAlunos.ok   ? (await resAlunos.json()).alunos   || [] : [];
      const materiasData = resMaterias.ok ? (await resMaterias.json()).materias || [] : [];

      const alunoIds   = new Set(alunosData.map(a => a.id));
      const materiaIds = new Set(materiasData.map(m => m.id));

      const alunosDisp   = todosUsuarios.filter(u => u.papel === "aluno"     && !alunoIds.has(u.id));
      const profesDisp   = todosUsuarios.filter(u => u.papel === "professor");
      const materiasDisp = todasMaterias.filter(m => !materiaIds.has(m.id));

      gestaoBody.innerHTML = `
        <div class="gestao-grid-2col">

          <!-- ── Painel Alunos ── -->
          <div class="gestao-panel">
            <div class="gestao-panel-header">
              <div class="gestao-panel-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              </div>
              <div>
                <div class="gestao-panel-title">Alunos matriculados</div>
              </div>
            </div>
            <div class="gestao-panel-body">
              ${buildCustomSelect("selAlunoWrap",
                  alunosDisp.map(u => ({ value: u.id, label: `${u.nome}${u.email ? " — " + u.email : ""}` })),
                  "Selecionar aluno...")}
              <button class="btn-gestao-add" id="btnAlunoAdd" style="width:100%;justify-content:center">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Matricular aluno
              </button>
              <div class="gestao-lista" id="gestaoAlunosLista">
                ${alunosData.length === 0
                  ? `<div class="gestao-vazio">Nenhum aluno matriculado.</div>`
                  : alunosData.map(a => `
                    <div class="gestao-item">
                      <div class="gestao-item-info">
                        <span class="gestao-item-nome">${a.nome}</span>
                        <span class="gestao-item-sub">${a.email || ""}</span>
                      </div>
                      <button class="btn-gestao-remove" title="Remover" data-acao="remove-aluno" data-id="${a.id}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                      </button>
                    </div>`).join("")}
              </div>
            </div>
          </div>

          <!-- ── Painel Matérias ── -->
          <div class="gestao-panel">
            <div class="gestao-panel-header">
              <div class="gestao-panel-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
              </div>
              <div>
                <div class="gestao-panel-title">Matérias e professores</div>
              </div>
            </div>
            <div class="gestao-panel-body">
              ${buildCustomSelect("selMateriaWrap",
                  materiasDisp.map(m => ({ value: m.id, label: `${m.nome}${m.carga_horaria ? " — " + m.carga_horaria + "h" : ""}` })),
                  "Selecionar matéria...")}
              <button class="btn-gestao-add" id="btnMateriaAdd" style="width:100%;justify-content:center">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Vincular matéria
              </button>
              <div id="gestaoMateriasLista" style="display:flex;flex-direction:column;gap:8px">
                ${materiasData.length === 0
                  ? `<div class="gestao-vazio">Nenhuma matéria vinculada.</div>`
                  : materiasData.map(m => {
                      const profsAtuais = m.professores
                        ? m.professores.split(", ").map(n => n.trim()).filter(Boolean)
                        : [];
                      const profsDispM = profesDisp.filter(p => !profsAtuais.includes(p.nome));
                      return `
                        <div class="gestao-materia-bloco" data-materia-id="${m.id}">
                          <div class="gestao-materia-header">
                            <div>
                              <div class="gestao-materia-nome">${m.nome}</div>
                              ${m.carga_horaria ? `<div class="gestao-materia-ch">${m.carga_horaria}h</div>` : ""}
                            </div>
                            <button class="btn-gestao-remove" title="Desvincular matéria" data-acao="remove-materia" data-id="${m.id}">
                              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                          </div>
                          <div class="gestao-materia-body">
                            <div class="gestao-custom-select-wrap" id="selProfWrap-${m.id}" style="margin-bottom:8px">
                              <button class="gestao-custom-select-btn" type="button" data-value="" style="width:100%">Atribuir professor...</button>
                              <div class="gestao-custom-select-dropdown">
                                <div class="gestao-custom-select-option selected" data-value="">Atribuir professor...</div>
                                ${profsDispM.map(p => `<div class="gestao-custom-select-option" data-value="${p.id}">${p.nome}</div>`).join("")}
                              </div>
                            </div>
                            <button class="btn-prof-add" data-materia-id="${m.id}" style="width:100%;justify-content:center;display:flex;align-items:center;gap:5px">
                              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:13px;height:13px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                              Atribuir
                            </button>
                            <div class="gestao-prof-lista" id="profLista-${m.id}" style="margin-top:8px">
                              ${profsAtuais.length === 0
                                ? `<div class="gestao-vazio">Sem professor atribuído.</div>`
                                : profsAtuais.map(nome => {
                                    const profObj = profesDisp.find(p => p.nome === nome);
                                    return `<div class="gestao-prof-item">
                                      <span>${nome}</span>
                                      ${profObj ? `<button class="btn-gestao-remove" style="width:24px;height:24px" title="Remover professor" data-acao="remove-prof" data-prof-id="${profObj.id}" data-materia-id="${m.id}">

                                      </button>` : ""}
                                    </div>`;
                                  }).join("")}
                            </div>
                          </div>
                        </div>`;
                    }).join("")}
              </div>
            </div>
          </div>
        </div>
      `;

      // init custom selects
      initCustomSelect("selAlunoWrap");
      initCustomSelect("selMateriaWrap");
      materiasData.forEach(m => initCustomSelect(`selProfWrap-${m.id}`));

      // ── Eventos ──────────────────────────────────
      // Matricular aluno
      document.getElementById("btnAlunoAdd").addEventListener("click", async () => {
        const wrap = document.getElementById("selAlunoWrap");
        const alunoId = wrap?.querySelector(".gestao-custom-select-btn")?.dataset?.value;
        if (!alunoId) { Swal.fire("Atenção", "Selecione um aluno.", "warning"); return; }

        const btn = document.getElementById("btnAlunoAdd");
        btn.disabled = true;
        try {
          const res = await fetch(`/api/turmas/${turmaId}/alunos`, {
            method: "POST",
            headers: { "Content-Type": "application/json", Authorization: `Bearer ${getToken()}` },
            body: JSON.stringify({ usuario_id: alunoId }),
          });
          const dados = await res.json();
          if (!res.ok) { Swal.fire("Erro", dados.message || "Erro ao matricular.", "error"); return; }
          Swal.fire({ icon:"success", title:"Matriculado!", timer:1400, showConfirmButton:false });
          todosUsuarios = [];
          await carregarModalGestao(turmaId);
          await carregarTurmas();
        } catch { Swal.fire("Erro", "Falha na conexão.", "error"); }
        finally { btn.disabled = false; }
      });

      // Vincular matéria
      document.getElementById("btnMateriaAdd").addEventListener("click", async () => {
        const wrap = document.getElementById("selMateriaWrap");
        const materiaId = wrap?.querySelector(".gestao-custom-select-btn")?.dataset?.value;
        if (!materiaId) { Swal.fire("Atenção", "Selecione uma matéria.", "warning"); return; }

        const btn = document.getElementById("btnMateriaAdd");
        btn.disabled = true;
        try {
          const res = await fetch(`/api/turmas/${turmaId}/materias`, {
            method: "POST",
            headers: { "Content-Type": "application/json", Authorization: `Bearer ${getToken()}` },
            body: JSON.stringify({ materia_id: materiaId }),
          });
          const dados = await res.json();
          if (!res.ok) { Swal.fire("Erro", dados.message || "Erro ao vincular.", "error"); return; }
          Swal.fire({ icon:"success", title:"Vinculada!", timer:1400, showConfirmButton:false });
          await carregarModalGestao(turmaId);
          await carregarTurmas();
        } catch { Swal.fire("Erro", "Falha na conexão.", "error"); }
        finally { btn.disabled = false; }
      });

      // Atribuir professor
      document.querySelectorAll(".btn-prof-add").forEach(btn => {
        btn.addEventListener("click", async () => {
          const mId  = btn.dataset.materiaId;
          const wrap = document.getElementById(`selProfWrap-${mId}`);
          const profId = wrap?.querySelector(".gestao-custom-select-btn")?.dataset?.value;
          if (!profId) { Swal.fire("Atenção", "Selecione um professor.", "warning"); return; }

          btn.disabled = true;
          try {
            const res = await fetch(`/api/turmas/${turmaId}/materias/${mId}/professor`, {
              method: "POST",
              headers: { "Content-Type": "application/json", Authorization: `Bearer ${getToken()}` },
              body: JSON.stringify({ professor_id: profId }),
            });
            const dados = await res.json();
            if (!res.ok) { Swal.fire("Erro", dados.message || "Erro ao atribuir.", "error"); return; }
            Swal.fire({ icon:"success", title:"Professor atribuído!", timer:1400, showConfirmButton:false });
            await carregarModalGestao(turmaId);
          } catch { Swal.fire("Erro", "Falha na conexão.", "error"); }
          finally { btn.disabled = false; }
        });
      });

      // Remoções via delegação
      gestaoBody.addEventListener("click", async e => {
        const btn = e.target.closest("[data-acao]");
        if (!btn) return;
        const acao = btn.dataset.acao;

        if (acao === "remove-aluno") {
          const aId = btn.dataset.id;
          const confirm = await Swal.fire({
            icon:"warning", title:"Remover aluno?",
            text:"O aluno será desmatriculado desta turma.",
            showCancelButton:true, confirmButtonText:"Remover", cancelButtonText:"Cancelar",
            confirmButtonColor:"#e74c3c"
          });
          if (!confirm.isConfirmed) return;
          const res = await fetch(`/api/turmas/${turmaId}/alunos/${aId}`, {
            method: "DELETE", headers: { Authorization: `Bearer ${getToken()}` }
          });
          if (res.ok) {
            Swal.fire({ icon:"success", title:"Aluno removido!", timer:1200, showConfirmButton:false });
            todosUsuarios = [];
            await carregarModalGestao(turmaId);
            await carregarTurmas();
          }
        }

        if (acao === "remove-materia") {
          const mId = btn.dataset.id;
          const confirm = await Swal.fire({
            icon:"warning", title:"Desvincular matéria?",
            text:"A matéria será removida desta turma.",
            showCancelButton:true, confirmButtonText:"Remover", cancelButtonText:"Cancelar",
            confirmButtonColor:"#e74c3c"
          });
          if (!confirm.isConfirmed) return;
          const res = await fetch(`/api/turmas/${turmaId}/materias/${mId}`, {
            method: "DELETE", headers: { Authorization: `Bearer ${getToken()}` }
          });
          if (res.ok) {
            Swal.fire({ icon:"success", title:"Matéria removida!", timer:1200, showConfirmButton:false });
            await carregarModalGestao(turmaId);
            await carregarTurmas();
          }
        }

        if (acao === "remove-prof") {
          const profId = btn.dataset.profId;
          const mId    = btn.dataset.materiaId;
          const res = await fetch(`/api/turmas/${turmaId}/materias/${mId}/professor/${profId}`, {
            method: "DELETE", headers: { Authorization: `Bearer ${getToken()}` }
          });
          if (res.ok) {
            Swal.fire({ icon:"success", title:"Professor removido!", timer:1200, showConfirmButton:false });
            await carregarModalGestao(turmaId);
          }
        }
      }, { once: true });
    }

    // ── Aba Gestão (mantida por compatibilidade, redireciona para o modal) ──
    async function carregarAbaGestao(turmaId) {
      await carregarModalGestao(turmaId);
    }

    document.querySelectorAll(".modal-tab").forEach(tab => {
      tab.addEventListener("click", async () => {
        if (tab.dataset.tab === tabAtiva) return;
        tabAtiva = tab.dataset.tab;
        document.querySelectorAll(".modal-tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        await carregarAba(tabAtiva, turmaDetalheId);
      });
    });

    fecharDetalhes.addEventListener("click", () => modalDetalhes.classList.remove("show"));
    modalDetalhes.addEventListener("click", e => { if (e.target === modalDetalhes) modalDetalhes.classList.remove("show"); });

    // ── Modal Gestão ──────────────────────────────────────
    fecharGestao.addEventListener("click", () => modalGestao.classList.remove("show"));
    modalGestao.addEventListener("click", e => { if (e.target === modalGestao) modalGestao.classList.remove("show"); });

    // ── Modal Nova Turma ──────────────────────────────────
    btnNovaTurma.addEventListener("click", () => modalNovaTurma.classList.add("show"));
    fecharNovaTurma.addEventListener("click",  () => modalNovaTurma.classList.remove("show"));
    cancelarNovaTurma.addEventListener("click", () => modalNovaTurma.classList.remove("show"));
    modalNovaTurma.addEventListener("click", e => { if (e.target === modalNovaTurma) modalNovaTurma.classList.remove("show"); });

    confirmarNovaTurma.addEventListener("click", async () => {
      const payload = {
        nome:       document.getElementById("inputNome").value.trim(),
        codigo:     document.getElementById("inputCodigo").value.trim(),
        periodo:    document.getElementById("inputPeriodo").value,
        ano:        document.getElementById("inputAno").value,
        semestre:   document.getElementById("inputSemestre").value,
        turno:      document.getElementById("inputTurno").value,
        capacidade: document.getElementById("inputCapacidade").value,
      };

      if (!payload.nome || !payload.codigo || !payload.periodo || !payload.capacidade) {
        Swal.fire("Atenção", "Preencha todos os campos obrigatórios.", "warning"); return;
      }

      try {
        const res = await fetch("/api/turmas", {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${getToken()}` },
          body: JSON.stringify(payload),
        });
        const dados = await res.json();
        if (!res.ok) { Swal.fire("Erro", dados.message || "Erro ao criar turma.", "error"); return; }

        modalNovaTurma.classList.remove("show");
        Swal.fire("Sucesso", "Turma criada com sucesso.", "success");
        await carregarTurmas();
      } catch { Swal.fire("Erro", "Falha na conexão com o servidor.", "error"); }
    });

    // ── Filtros custom ────────────────────────────────────
    function initFiltroCustom(wrapId, btnId, dropId, lblId, hiddenSelectId) {
      const wrap  = document.getElementById(wrapId);
      const btn   = document.getElementById(btnId);
      const drop  = document.getElementById(dropId);
      if (!wrap || !btn || !drop) return;
      btn.addEventListener("click", e => { e.stopPropagation(); wrap.classList.toggle("open"); });
      drop.addEventListener("click", e => {
        const opt = e.target.closest(".filtro-custom-option");
        if (!opt) return;
        const val = opt.dataset.value;
        const lbl = document.getElementById(lblId);
        if (lbl) lbl.textContent = opt.textContent;
        drop.querySelectorAll(".filtro-custom-option").forEach(o => o.classList.remove("selected"));
        opt.classList.add("selected");
        wrap.classList.remove("open");
        // sync hidden select
        const sel = document.getElementById(hiddenSelectId);
        if (sel) { sel.value = val; sel.dispatchEvent(new Event("change")); }
      });
      document.addEventListener("click", () => wrap.classList.remove("open"));
    }

    initFiltroCustom("wrapFiltroPeriodo","btnFiltroPeriodo","dropFiltroPeriodo","lblFiltroPeriodo","filtroPeriodo");
    initFiltroCustom("wrapFiltroTurno",  "btnFiltroTurno",  "dropFiltroTurno",  "lblFiltroTurno",  "filtroTurno");

    function atualizarDropdownPeriodo() {
      const periodos = [...new Set(todasTurmas.map(t => t.periodo).filter(Boolean))].sort((a,b) => a-b);
      const drop = document.getElementById("dropFiltroPeriodo");
      if (!drop) return;
      drop.innerHTML = `<div class="filtro-custom-option selected" data-value="">Todos os períodos</div>`;
      periodos.forEach(p => {
        drop.innerHTML += `<div class="filtro-custom-option" data-value="${p}">${p}º período</div>`;
      });
    }

    function atualizarDropdownTurno() {
      const turnos = [...new Set(todasTurmas.map(t => t.turno).filter(Boolean).map(t => t.trim()))].sort();
      const drop = document.getElementById("dropFiltroTurno");
      if (!drop) return;
      drop.innerHTML = `<div class="filtro-custom-option selected" data-value="">Todos os turnos</div>`;
      turnos.forEach(t => {
        drop.innerHTML += `<div class="filtro-custom-option" data-value="${t.toLowerCase()}">${t}</div>`;
      });
    }

    // ── Filtros ───────────────────────────────────────────
    if (filtroPeriodo) filtroPeriodo.addEventListener("change", renderizarTurmas);
    if (filtroTurno)   filtroTurno.addEventListener("change",   renderizarTurmas);

    // ── Header ───────────────────────────────────────────
    if (botaoMenuUsuario) botaoMenuUsuario.addEventListener("click", () => menuUsuario.classList.toggle("show"));
    if (btnEditarPerfil)  btnEditarPerfil.addEventListener("click",  () => window.location.href = "/perfil");
    if (btnSair) btnSair.addEventListener("click", async () => {
      const ok = await Swal.fire({ icon:"question", title:"Deseja sair?", text:"Sua sessão será encerrada.",
        showCancelButton:true, confirmButtonText:"Sim, sair", cancelButtonText:"Cancelar" });
      if (ok.isConfirmed) { limparSessao(); window.location.href = "/"; }
    });

    // ── Init ─────────────────────────────────────────────
    carregarUsuarioLogado();
  </script>

  <script src="/static/js/darkmode.js"></script>

</body>
</html>
