<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitora+ | Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="inicio-body cal-page perfil-page">

{% include 'components/sidebar.html' %}

  <main class="inicio-main">
    {% include 'components/header.html' %}

    <section class="perfil-content">
      <h2>Perfil</h2>

      <form class="perfil-card" id="formPerfil" autocomplete="off">

        <p class="perfil-section-label"><i class="ph ph-user"></i> Dados pessoais</p>

        <div class="perfil-row">
          <label class="perfil-field perfil-field-full">
            <span>Nome</span>
            <input type="text" id="nome" required>
          </label>
        </div>

        <div class="perfil-row">
          <label class="perfil-field">
            <span>E-mail</span>
            <input type="email" id="email" required>
          </label>

          <label class="perfil-field">
            <span>Telefone</span>
            <input type="text" id="telefone" maxlength="14" required>
          </label>
        </div>

        <div class="perfil-row">
          <label class="perfil-field">
            <span>Data de Nascimento</span>
            <input type="date" id="dataNascimento" required>
          </label>

          <label class="perfil-field">
            <span>CPF</span>
            <input type="text" id="cpf" readonly>
          </label>
        </div>

        <p class="perfil-section-label" style="margin-top: 8px;"><i class="ph ph-lock"></i> Segurança</p>

        <div class="perfil-row">
          <label class="perfil-field">
            <span>Nova senha</span>
            <input
              type="password"
              id="novaSenha"
              name="novaSenhaPerfil"
              autocomplete="new-password"
              placeholder="Preencha apenas se quiser alterar a senha"
            >
          </label>
        </div>

        <div class="perfil-actions">
          <button type="button" class="perfil-cancel-button" id="btnCancelar">Cancelar</button>
          <button type="submit" class="perfil-save-button">Salvar alterações</button>
        </div>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    const formPerfil = document.getElementById("formPerfil");

    const nomeInput          = document.getElementById("nome");
    const emailInput         = document.getElementById("email");
    const telefoneInput      = document.getElementById("telefone");
    const dataNascimentoInput= document.getElementById("dataNascimento");
    const cpfInput           = document.getElementById("cpf");
    const novaSenhaInput     = document.getElementById("novaSenha");
    const btnCancelar        = document.getElementById("btnCancelar");
    let perfilOriginal       = null;

    // Elementos do header/sidebar — injetados pelos includes; guards evitam erros
    const nomeUsuarioTopo  = document.getElementById("nomeUsuarioTopo");
    const papelUsuario     = document.getElementById("papelUsuario");
    const avatarUsuario    = document.getElementById("avatarUsuario");
    const botaoMenuUsuario = document.getElementById("botaoMenuUsuario");
    const menuUsuario      = document.getElementById("menuUsuario");
    const btnSair          = document.getElementById("btnSair");
    const btnEditarPerfil  = document.getElementById("btnEditarPerfil");
    const btnGestaoUsuarios= document.getElementById("btnGestaoUsuarios");

    // ── Helpers ────────────────────────────────────────────────────────
    function formatarPapel(papel) {
      const n = String(papel).toLowerCase();
      if (n === "admin" || n === "adm" || n === "coordenador") return "Coordenador";
      if (n === "professor") return "Professor";
      if (n === "aluno") return "Aluno";
      return papel;
    }

    function limparSessaoFront() {
      localStorage.removeItem("token");
      localStorage.removeItem("usuario");
      localStorage.removeItem("sessaoExpiracao");
    }

    function obterToken()  { return localStorage.getItem("token"); }

    function tokenExpirado(exp) {
      return Number(exp) < Math.floor(Date.now() / 1000);
    }

    function verificarTokenFront() {
      const token = obterToken();
      const exp   = localStorage.getItem("sessaoExpiracao");
      if (!token || !exp || tokenExpirado(exp)) {
        limparSessaoFront();
        window.location.href = "/";
        return false;
      }
      return true;
    }

    function somenteNumeros(v)  { return v.replace(/\D/g, ""); }

    function formatarCpf(v) {
      const n = somenteNumeros(v).slice(0, 11);
      if (n.length <= 3) return n;
      if (n.length <= 6) return `${n.slice(0,3)}.${n.slice(3)}`;
      if (n.length <= 9) return `${n.slice(0,3)}.${n.slice(3,6)}.${n.slice(6)}`;
      return `${n.slice(0,3)}.${n.slice(3,6)}.${n.slice(6,9)}-${n.slice(9)}`;
    }

    function formatarTelefone(v) {
      let n = v.replace(/\D/g, "").slice(0, 11);
      if (n.length <= 2)  return n;
      if (n.length <= 6)  return `(${n.slice(0,2)})${n.slice(2)}`;
      if (n.length <= 10) return `(${n.slice(0,2)})${n.slice(2,6)}-${n.slice(6)}`;
      return `(${n.slice(0,2)})${n.slice(2,7)}-${n.slice(7)}`;
    }

    function telefoneValido(v) {
      const n = v.replace(/\D/g, "");
      return n.length === 10 || n.length === 11;
    }

    function emailValido(e) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
    }

    function idadeMinimaValida(dataIso, idadeMinima = 12) {
      const dataNascimento = new Date(`${dataIso}T00:00:00`);
      if (Number.isNaN(dataNascimento.getTime())) return false;

      const hoje = new Date();
      let idade = hoje.getFullYear() - dataNascimento.getFullYear();
      const aniversarioAindaNaoChegou =
        hoje.getMonth() < dataNascimento.getMonth() ||
        (hoje.getMonth() === dataNascimento.getMonth() && hoje.getDate() < dataNascimento.getDate());

      if (aniversarioAindaNaoChegou) idade -= 1;
      return idade >= idadeMinima;
    }

    function normalizarPerfilParaComparacao(dados) {
      return {
        nome: (dados.nome || "").trim(),
        email: (dados.email || "").trim().toLowerCase(),
        telefone: somenteNumeros(dados.telefone || ""),
        data_nascimento: dados.data_nascimento || ""
      };
    }

    function obterPerfilAtual() {
      return normalizarPerfilParaComparacao({
        nome: nomeInput.value,
        email: emailInput.value,
        telefone: telefoneInput.value,
        data_nascimento: dataNascimentoInput.value
      });
    }

    function perfilFoiAlterado() {
      if (!perfilOriginal) return true;

      const perfilAtual = obterPerfilAtual();
      return Object.keys(perfilAtual).some((campo) => perfilAtual[campo] !== perfilOriginal[campo]);
    }

    // ── Preenche dados no topo (header component) ──────────────────────
    function preencherTopo(usuario) {
      if (nomeUsuarioTopo) nomeUsuarioTopo.textContent = usuario.nome;
      if (papelUsuario)    papelUsuario.textContent    = formatarPapel(usuario.papel);
      if (avatarUsuario)   avatarUsuario.textContent   = usuario.nome.charAt(0).toUpperCase();

      const isCoord = ["coordenador","admin","adm"].includes(usuario.papel.toLowerCase());
      if (isCoord && btnGestaoUsuarios) {
        btnGestaoUsuarios.style.display = "block";
      }
    }

    // ── Validações ─────────────────────────────────────────────────────
    function validarCampos() {
      const nome     = nomeInput.value.trim();
      const email    = emailInput.value.trim();
      const telefone = telefoneInput.value.trim();

      if (nome.length < 3) {
        Swal.fire({ icon:"warning", title:"Nome inválido", text:"O nome deve ter pelo menos 3 letras." });
        return false;
      }
      if (!emailValido(email)) {
        Swal.fire({ icon:"warning", title:"E-mail inválido", text:"Digite um e-mail válido, contendo @ e domínio." });
        return false;
      }
      if (!telefoneValido(telefone)) {
        Swal.fire({ icon:"warning", title:"Telefone inválido", text:"Digite um telefone com DDD, no formato (xx)xxxxx-xxxx." });
        return false;
      }
      if (!dataNascimentoInput.value) {
        Swal.fire({ icon:"warning", title:"Data obrigatória", text:"Informe a data de nascimento." });
        return false;
      }
      if (!idadeMinimaValida(dataNascimentoInput.value)) {
        Swal.fire({ icon:"warning", title:"Idade inválida", text:"A idade mínima permitida é de 12 anos." });
        return false;
      }
      return true;
    }

    // ── Máscara telefone ───────────────────────────────────────────────
    telefoneInput.addEventListener("input", function() {
      telefoneInput.value = formatarTelefone(telefoneInput.value);
    });

    // ── Carrega perfil via API ─────────────────────────────────────────
    async function carregarPerfil() {
      if (!verificarTokenFront()) return;

      const token = obterToken();

      try {
        const resposta = await fetch("/api/perfil", {
          method: "GET",
          headers: { "Authorization": `Bearer ${token}` }
        });

        if (!resposta.ok) {
          limparSessaoFront();
          window.location.href = "/";
          return;
        }

        const dados   = await resposta.json();
        const usuario = dados.usuario;

        preencherTopo(usuario);

        nomeInput.value           = usuario.nome            || "";
        emailInput.value          = usuario.email           || "";
        telefoneInput.value       = formatarTelefone(usuario.telefone || "");
        cpfInput.value            = formatarCpf(usuario.cpf || "");
        dataNascimentoInput.value = usuario.data_nascimento || "";
        novaSenhaInput.value      = "";
        perfilOriginal = normalizarPerfilParaComparacao({
          nome: usuario.nome,
          email: usuario.email,
          telefone: usuario.telefone,
          data_nascimento: usuario.data_nascimento
        });

      } catch (erro) {
        console.error("Erro ao carregar perfil:", erro);
        Swal.fire({ icon:"error", title:"Erro", text:"Não foi possível carregar os dados do perfil." });
      }
    }

    // ── Submit ─────────────────────────────────────────────────────────
    formPerfil.addEventListener("submit", async function(event) {
      event.preventDefault();
      if (!verificarTokenFront()) return;
      if (!validarCampos()) return;

      let senhaAtual = "";
      const novaSenha = novaSenhaInput.value.trim();

      if (!perfilFoiAlterado() && !novaSenha) {
        Swal.fire({ icon:"info", title:"Nenhum dado foi atualizado", text:"Altere pelo menos um campo antes de salvar." });
        return;
      }

      if (novaSenha) {
        const res = await Swal.fire({
          title: "Confirme sua senha atual",
          text:  "Para alterar a senha, digite sua senha atual.",
          input: "password",
          inputPlaceholder: "Senha atual",
          inputAttributes: { autocapitalize:"off", autocorrect:"off" },
          showCancelButton: true,
          confirmButtonText: "Confirmar",
          cancelButtonText:  "Cancelar",
          inputValidator: (v) => !v ? "Digite sua senha atual para continuar." : null
        });
        if (!res.isConfirmed) return;
        senhaAtual = res.value;
      }

      const confirmacao = await Swal.fire({
        icon: "question",
        title: "Salvar alterações?",
        text:  "Deseja realmente alterar os dados do perfil?",
        showCancelButton: true,
        confirmButtonText: "Sim, salvar",
        cancelButtonText:  "Cancelar"
      });
      if (!confirmacao.isConfirmed) return;

      const token = obterToken();
      const dadosPerfil = {
        nome:           nomeInput.value.trim(),
        email:          emailInput.value.trim().toLowerCase(),
        telefone:       somenteNumeros(telefoneInput.value),
        data_nascimento:dataNascimentoInput.value,
        senha_atual:    senhaAtual,
        nova_senha:     novaSenha
      };

      try {
        const resposta = await fetch("/api/perfil", {
          method: "PUT",
          headers: {
            "Content-Type":  "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify(dadosPerfil)
        });

        const dados = await resposta.json();

        if (!resposta.ok) {
          Swal.fire({ icon:"error", title:"Erro", text: dados.message || "Não foi possível atualizar o perfil." });
          return;
        }

        localStorage.setItem("token",          dados.token);
        localStorage.setItem("usuario",        JSON.stringify(dados.usuario));
        localStorage.setItem("sessaoExpiracao",String(dados.sessao.expiracao));

        novaSenhaInput.value = "";
        preencherTopo(dados.usuario);
        perfilOriginal = obterPerfilAtual();

        Swal.fire({
          icon: "success",
          title: "Perfil atualizado!",
          text:  dados.message,
          timer: 1500,
          showConfirmButton: false,
          didClose: () => { window.location.href = "/inicio"; }
        });

      } catch (erro) {
        console.error("Erro ao atualizar perfil:", erro);
        Swal.fire({ icon:"error", title:"Erro inesperado", text:"Não foi possível conectar ao servidor." });
      }
    });

    // ── Sair ───────────────────────────────────────────────────────────
    async function sair() {
      const confirmacao = await Swal.fire({
        icon: "question",
        title: "Deseja sair?",
        text: "Sua sessão será encerrada.",
        showCancelButton: true,
        confirmButtonText: "Sim, sair",
        cancelButtonText:  "Cancelar"
      });
      if (!confirmacao.isConfirmed) return;

      const token = obterToken();
      try {
        if (token) {
          await fetch("/api/logout", {
            method: "POST",
            headers: { "Authorization": `Bearer ${token}` }
          });
        }
      } catch (erro) {
        console.error("Erro ao chamar logout:", erro);
      }

      limparSessaoFront();
      window.location.href = "/";
    }

    // ── Eventos do header/menu (com guards) ────────────────────────────
    if (botaoMenuUsuario) {
      botaoMenuUsuario.addEventListener("click", function() {
        menuUsuario.classList.toggle("show");
      });
    }

    window.addEventListener("click", function(event) {
      if (!event.target.closest(".user-menu") && menuUsuario) {
        menuUsuario.classList.remove("show");
      }
    });

    if (btnSair)          btnSair.addEventListener("click", sair);
    if (btnEditarPerfil)  btnEditarPerfil.addEventListener("click", function() {
      if (menuUsuario) menuUsuario.classList.remove("show");
      window.location.href = "/perfil";
    });
    if (btnGestaoUsuarios) btnGestaoUsuarios.addEventListener("click", function() {
      if (menuUsuario) menuUsuario.classList.remove("show");
      window.location.href = "/gestao-usuarios";
    });

    btnCancelar.addEventListener("click", function() {
      window.location.href = "/inicio";
    });

    window.addEventListener("pageshow", function() {
      novaSenhaInput.value = "";
    });

    // ── Init ───────────────────────────────────────────────────────────
    carregarPerfil();
  </script>

  <script src="/static/js/darkmode.js"></script>

</body>
</html>
