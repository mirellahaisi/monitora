<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitora+ | Presença</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="inicio-body freq-page">

{% include 'components/sidebar.html' %}

<main class="inicio-main">

  {% include 'components/header.html' %}

  <section class="freq-content">

    <div class="page-heading">
      <div class="page-heading-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
      </div>
      <div>
        <h2>Presença</h2>
        <p>Selecione a matéria, turma e data para registrar a chamada</p>
      </div>
    </div>

    <div class="notas-filtros" id="filtrosPresenca">
      <div class="filtro-group">
        <label for="selectMateria">Matéria</label>
        <select id="selectMateria">
          <option value="">Selecione a matéria</option>
        </select>
      </div>
      <div class="filtro-group">
        <label for="selectTurma">Turma</label>
        <select id="selectTurma" disabled>
          <option value="">Selecione a turma</option>
        </select>
      </div>
      <div class="filtro-group">
        <label for="dataAula">Data da aula</label>
        <select id="dataAula" style="height:44px;border:1.5px solid rgba(147,215,223,0.4);border-radius:10px;background:var(--bg);color:var(--mid);font:inherit;font-size:0.92rem;font-weight:500;padding:0 14px;outline:none;width:100%;cursor:pointer;">
          <option value="">Selecione a data</option>
        </select>
      </div>
    </div>

    <div class="freq-result-area">
      <div class="presenca-card-wrap" id="presencaCardWrap">
        <div class="freq-empty" id="presencaEmpty">
          <i class="ph ph-magnifying-glass" style="font-size:3.5rem; opacity:0.3;"></i>
          <p>Selecione matéria, turma e data para carregar os alunos.</p>
        </div>
      </div>
    </div>

  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
  const selectMateria   = document.getElementById("selectMateria");
  const selectTurma     = document.getElementById("selectTurma");
  const dataAula        = document.getElementById("dataAula");
  const presencaCardWrap= document.getElementById("presencaCardWrap");

  const nomeUsuarioTopo  = document.getElementById("nomeUsuarioTopo");
  const papelUsuario     = document.getElementById("papelUsuario");
  const avatarUsuario    = document.getElementById("avatarUsuario");
  const botaoMenuUsuario = document.getElementById("botaoMenuUsuario");
  const menuUsuario      = document.getElementById("menuUsuario");
  const btnEditarPerfil  = document.getElementById("btnEditarPerfil");
  const btnSair          = document.getElementById("btnSair");

  function getToken() { return localStorage.getItem("token"); }
  function limparSessao() {
    localStorage.removeItem("token");
    localStorage.removeItem("usuario");
    localStorage.removeItem("sessaoExpiracao");
  }
  function tokenExpirado(exp) { return Number(exp) < Math.floor(Date.now() / 1000); }
  function verificarToken() {
    const exp = localStorage.getItem("sessaoExpiracao");
    if (!getToken() || !exp || tokenExpirado(exp)) {
      limparSessao(); window.location.href = "/"; return false;
    }
    return true;
  }
  function formatarPapel(papel) {
    const p = String(papel).toLowerCase();
    if (["admin","adm","coordenador"].includes(p)) return "Coordenador";
    if (p === "professor") return "Professor";
    if (p === "aluno") return "Aluno";
    return papel;
  }

  function mostrarVazio(msg) {
    presencaCardWrap.innerHTML = `
      <div class="freq-empty">
        <i class="ph ph-magnifying-glass" style="font-size:3.5rem; opacity:0.3;"></i>
        <p>${msg || "Selecione matéria, turma e data para carregar os alunos."}</p>
      </div>`;
  }

  function renderTabela(alunos) {
    presencaCardWrap.innerHTML = `
      <div class="presenca-card" style="
        background:#fff;
        border:1.5px solid rgba(147,215,223,0.25);
        border-radius:16px;
        overflow:hidden;
        box-shadow:0 4px 20px rgba(76,190,190,0.08);
        width:100%;
      ">
        <table style="width:100%;border-collapse:collapse;">
          <thead style="background:linear-gradient(90deg,rgba(147,215,223,0.15),rgba(87,219,189,0.1));">
            <tr>
              <th style="height:48px;padding:0 20px;color:var(--mid);font-family:'Sora',sans-serif;font-size:0.78rem;font-weight:700;text-align:left;letter-spacing:0.04em;text-transform:uppercase;border-bottom:1.5px solid rgba(147,215,223,0.25);">Aluno(a)</th>
              <th style="height:48px;padding:0 20px;color:var(--mid);font-family:'Sora',sans-serif;font-size:0.78rem;font-weight:700;text-align:center;letter-spacing:0.04em;text-transform:uppercase;border-bottom:1.5px solid rgba(147,215,223,0.25);">Presente</th>
              <th style="height:48px;padding:0 20px;color:var(--mid);font-family:'Sora',sans-serif;font-size:0.78rem;font-weight:700;text-align:center;letter-spacing:0.04em;text-transform:uppercase;border-bottom:1.5px solid rgba(147,215,223,0.25);">Ausente</th>
            </tr>
          </thead>
          <tbody id="tabelaPresenca">
            ${alunos.map(aluno => {
              const presenteMarcado = aluno.presente === 1 || aluno.presente === true;
              const ausenteMarcado  = aluno.presente === 0;
              return `
                <tr data-aluno-id="${aluno.id}" style="border-bottom:1px solid rgba(147,215,223,0.15);">
                  <td style="height:56px;padding:0 20px;color:var(--text);font-size:0.92rem;">${aluno.nome}</td>
                  <td style="height:56px;padding:0 20px;text-align:center;">
                    <input type="radio" class="radio-presenca" name="presenca_${aluno.id}" value="1"
                      style="width:18px;height:18px;accent-color:var(--accent);cursor:pointer;"
                      ${presenteMarcado ? "checked" : ""}>
                  </td>
                  <td style="height:56px;padding:0 20px;text-align:center;">
                    <input type="radio" class="radio-presenca" name="presenca_${aluno.id}" value="0"
                      style="width:18px;height:18px;accent-color:var(--accent);cursor:pointer;"
                      ${ausenteMarcado ? "checked" : ""}>
                  </td>
                </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>
      <textarea
        id="justificativa"
        placeholder="Observações: professor, utilize este campo para justificar uma falta específica"
        style="width:100%;min-height:105px;border:1.5px solid rgba(147,215,223,0.4);border-radius:14px;padding:14px 16px;background:#fff;color:var(--mid);font:inherit;resize:vertical;outline:none;box-shadow:0 2px 12px rgba(76,190,190,0.06);margin-top:18px;"
      ></textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:16px;">
        <button id="btnSalvarPresenca" type="button" style="height:46px;padding:0 28px;border:none;border-radius:10px;background:var(--grad);color:white;font:inherit;font-size:0.92rem;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(87,219,189,0.3);transition:opacity 0.2s,transform 0.15s;">
          Salvar chamada
        </button>
      </div>`;

    document.getElementById("btnSalvarPresenca").addEventListener("click", salvarPresenca);
  }

  async function carregarUsuarioLogado() {
    if (!verificarToken()) return;
    try {
      const usuarioCache = (() => {
        try {
          const t = localStorage.getItem("token");
          if (t) {
            const part = t.split(".")[1];
            const b64  = part.replace(/-/g,"+").replace(/_/g,"/");
            const pad  = "=".repeat((4 - b64.length % 4) % 4);
            return JSON.stringify(JSON.parse(atob(b64 + pad)));
          }
        } catch(e){}
        return localStorage.getItem("usuario");
      })();
      if (usuarioCache) {
        const u = JSON.parse(usuarioCache);
        if (nomeUsuarioTopo) nomeUsuarioTopo.textContent = u.nome;
        if (papelUsuario)    papelUsuario.textContent    = formatarPapel(u.papel);
        if (avatarUsuario)   avatarUsuario.textContent   = u.nome.charAt(0).toUpperCase();
        const btnGestao = document.getElementById("btnGestaoUsuarios");
        if (btnGestao && ["coordenador","admin","adm"].includes(String(u.papel).toLowerCase()))
          btnGestao.style.display = "block";
      }
    } catch(e) { console.warn("Erro cache:", e); }

    try {
      const r = await fetch("/api/usuario-logado", { headers: { "Authorization": `Bearer ${getToken()}` } });
      if (!r.ok) { limparSessao(); window.location.href = "/"; return; }
      const { usuario } = await r.json();
      localStorage.setItem("usuario", JSON.stringify(usuario));
      if (nomeUsuarioTopo) nomeUsuarioTopo.textContent = usuario.nome;
      if (papelUsuario)    papelUsuario.textContent    = formatarPapel(usuario.papel);
      if (avatarUsuario)   avatarUsuario.textContent   = usuario.nome.charAt(0).toUpperCase();
      const btnGestao = document.getElementById("btnGestaoUsuarios");
      if (btnGestao && ["coordenador","admin","adm"].includes(String(usuario.papel).toLowerCase()))
        btnGestao.style.display = "block";
    } catch { limparSessao(); window.location.href = "/"; }
  }

  async function carregarMaterias() {
    try {
      const r = await fetch("/api/presenca/materias", { headers: { "Authorization": `Bearer ${getToken()}` } });
      const dados = await r.json();
      if (!r.ok) { Swal.fire("Erro", dados.message || "Erro ao carregar matérias.", "error"); return; }
      selectMateria.innerHTML = `<option value="">Selecione a matéria</option>`;
      dados.materias.forEach(m => {
        selectMateria.innerHTML += `<option value="${m.id}">${m.nome}</option>`;
      });
    } catch { Swal.fire("Erro", "Falha na conexão com o servidor.", "error"); }
  }

  async function carregarTurmas() {
    selectTurma.innerHTML = `<option value="">Selecione a turma</option>`;
    selectTurma.disabled = true;
    dataAula.innerHTML = `<option value="">Selecione a data</option>`;
    dataAula.disabled = true;
    mostrarVazio();
    if (!selectMateria.value) return;
    try {
      const r = await fetch(`/api/presenca/turmas?materia_id=${selectMateria.value}`, {
        headers: { "Authorization": `Bearer ${getToken()}` }
      });
      const dados = await r.json();
      if (!r.ok) { Swal.fire("Erro", dados.message || "Erro ao carregar turmas.", "error"); return; }
      dados.turmas.forEach(t => {
        const periodo = t.periodo ? ` - ${t.periodo}` : "";
        selectTurma.innerHTML += `<option value="${t.id}">${t.nome}${periodo}</option>`;
      });
      selectTurma.disabled = false;
    } catch { Swal.fire("Erro", "Falha ao buscar turmas.", "error"); }
  }

  async function carregarDatas() {
    dataAula.innerHTML = `<option value="">Selecione a data</option>`;
    dataAula.disabled = true;
    mostrarVazio();
    if (!selectMateria.value || !selectTurma.value) return;
    try {
      const r = await fetch(`/api/presenca/datas?materia_id=${selectMateria.value}&turma_id=${selectTurma.value}`, {
        headers: { "Authorization": `Bearer ${getToken()}` }
      });
      if (r.ok) {
        const dados = await r.json();
        (dados.datas || []).forEach(d => {
          dataAula.innerHTML += `<option value="${d}">${d}</option>`;
        });
        dataAula.disabled = false;
      } else {
        // fallback: input date nativo caso a API não exista
        dataAula.outerHTML = `<input type="date" id="dataAula" style="height:44px;border:1.5px solid rgba(147,215,223,0.4);border-radius:10px;background:var(--bg);color:var(--mid);font:inherit;font-size:0.92rem;padding:0 14px;outline:none;width:100%;cursor:pointer;">`;
        document.getElementById("dataAula").addEventListener("change", carregarAlunos);
      }
    } catch {
      dataAula.outerHTML = `<input type="date" id="dataAula" style="height:44px;border:1.5px solid rgba(147,215,223,0.4);border-radius:10px;background:var(--bg);color:var(--mid);font:inherit;font-size:0.92rem;padding:0 14px;outline:none;width:100%;cursor:pointer;">`;
      document.getElementById("dataAula").addEventListener("change", carregarAlunos);
    }
  }

  async function carregarAlunos() {
    const materiaId = selectMateria.value;
    const turmaId   = document.getElementById("selectTurma").value;
    const data      = document.getElementById("dataAula").value;
    if (!materiaId || !turmaId || !data) { mostrarVazio(); return; }

    presencaCardWrap.innerHTML = `
      <div class="freq-empty">
        <i class="ph ph-spinner" style="font-size:2.5rem; opacity:0.4;"></i>
        <p>Carregando alunos...</p>
      </div>`;

    try {
      const r = await fetch(
        `/api/presenca/alunos?materia_id=${materiaId}&turma_id=${turmaId}&data_aula=${data}`,
        { headers: { "Authorization": `Bearer ${getToken()}` } }
      );
      const dados = await r.json();
      if (!r.ok) { Swal.fire("Erro", dados.message || "Erro ao carregar alunos.", "error"); mostrarVazio(); return; }
      if (!dados.alunos || dados.alunos.length === 0) {
        mostrarVazio("Nenhum aluno encontrado para essa turma.");
        return;
      }
      renderTabela(dados.alunos);
    } catch { Swal.fire("Erro", "Falha ao buscar alunos.", "error"); mostrarVazio(); }
  }

  async function salvarPresenca() {
    const materiaId = selectMateria.value;
    const turmaId   = document.getElementById("selectTurma").value;
    const data      = document.getElementById("dataAula").value;

    if (!materiaId) { Swal.fire("Atenção", "Selecione a matéria.", "warning"); return; }
    if (!turmaId)   { Swal.fire("Atenção", "Selecione a turma.", "warning"); return; }
    if (!data)      { Swal.fire("Atenção", "Selecione a data da aula.", "warning"); return; }

    const linhas = document.querySelectorAll("#tabelaPresenca tr[data-aluno-id]");
    const alunos = [];
    for (const linha of linhas) {
      const alunoId   = linha.dataset.alunoId;
      const nomeAluno = linha.querySelector("td").textContent.trim();
      const radio     = linha.querySelector(`input[name="presenca_${alunoId}"]:checked`);
      if (!radio) {
        Swal.fire("Atenção", `Marque presença ou ausência para o(a) aluno(a) ${nomeAluno}.`, "warning");
        return;
      }
      alunos.push({ aluno_id: alunoId, presente: Number(radio.value) });
    }

    if (alunos.length === 0) { Swal.fire("Atenção", "Nenhum aluno carregado para salvar.", "warning"); return; }

    const justEl = document.getElementById("justificativa");

    try {
      const r = await fetch("/api/presenca/salvar", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${getToken()}` },
        body: JSON.stringify({
          materia_id:   materiaId,
          turma_id:     turmaId,
          data_aula:    data,
          justificativa:justEl ? justEl.value : "",
          alunos
        })
      });
      const dados = await r.json();
      if (!r.ok) { Swal.fire("Erro", dados.message || "Erro ao salvar presença.", "error"); return; }
      await Swal.fire("Sucesso", "Chamada salva com sucesso.", "success");
      selectMateria.value = "";
      selectTurma.innerHTML = `<option value="">Selecione a turma</option>`;
      selectTurma.disabled = true;
      dataAula.innerHTML = `<option value="">Selecione a data</option>`;
      dataAula.disabled = true;
      mostrarVazio();
    } catch { Swal.fire("Erro", "Falha na conexão com o servidor.", "error"); }
  }

  async function sair() {
    const c = await Swal.fire({
      icon:"question", title:"Deseja sair?", text:"Sua sessão será encerrada.",
      showCancelButton:true, confirmButtonText:"Sim, sair", cancelButtonText:"Cancelar"
    });
    if (!c.isConfirmed) return;
    limparSessao(); window.location.href = "/";
  }

  selectMateria.addEventListener("change", carregarTurmas);
  selectTurma.addEventListener("change", carregarDatas);
  dataAula.addEventListener("change", carregarAlunos);

  if (botaoMenuUsuario) botaoMenuUsuario.addEventListener("click", () => menuUsuario.classList.toggle("show"));
  if (btnEditarPerfil)  btnEditarPerfil.addEventListener("click", () => window.location.href = "/perfil");
  if (btnSair)          btnSair.addEventListener("click", sair);
  window.addEventListener("click", e => {
    if (!e.target.closest(".user-menu") && menuUsuario) menuUsuario.classList.remove("show");
  });

  carregarUsuarioLogado();
  carregarMaterias();
</script>

<script src="/static/js/darkmode.js"></script>

</body>
</html>
